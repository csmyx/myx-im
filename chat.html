<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>myx-im</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text2: #888;
            --primary: #4a9eff;
            --primary-dim: #3a7ecc;
            --accent: #6eca6e;
            --danger: #e05555;
            --radius: 10px;
            --radius-sm: 6px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --max-w: 640px;
        }

        body.light {
            --bg: #f5f5f5;
            --surface: #fff;
            --surface2: #f0f0f0;
            --border: #ddd;
            --text: #222;
            --text2: #666;
            --primary: #007aff;
            --primary-dim: #0056cc;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch;
        }

        body {
            font: 14px/1.5 var(--font);
            background: var(--bg);
            color: var(--text);
            transition:
                background 0.3s,
                color 0.3s;
        }

        input,
        button {
            font: inherit;
            color: inherit;
            border: none;
            outline: none;
            background: none;
        }

        button {
            cursor: pointer;
        }

        input {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: var(--max-w);
            margin: 0 auto;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            min-height: 0;
        }

        #authScreen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 100;
        }

        .auth-box {
            width: 100%;
            max-width: 340px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 24px;
            position: relative;
        }

        .auth-box h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 6px;
        }

        .auth-box .sub {
            text-align: center;
            color: var(--text2);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .auth-box label {
            display: block;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 4px;
            margin-top: 12px;
        }

        .auth-box input {
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
        }

        .auth-box input:focus {
            border-color: var(--primary);
        }

        .auth-box .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .auth-box .btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dim);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--surface2);
        }

        .auth-box .err {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            min-height: 18px;
        }

        .theme-toggle {
            font-size: 18px;
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 6px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            opacity: 0.5;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        .page {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .page.active {
            display: flex;
        }

        .page-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            flex-shrink: 0;
            min-height: 56px;
        }

        .page-header .btn-back {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text2);
            flex-shrink: 0;
            border-radius: var(--radius-sm);
        }

        .page-header .btn-back:hover {
            background: var(--surface2);
        }

        .page-header .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .page-header .info {
            flex: 1;
            min-width: 0;
        }

        .page-header .title {
            font-weight: 600;
            font-size: 15px;
        }

        .page-header .subtitle {
            font-size: 11px;
            color: var(--text2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .page-header .header-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .page-header .header-actions button {
            padding: 6px 10px;
            font-size: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text2);
        }

        .page-header .header-actions button:hover {
            color: var(--text);
            border-color: var(--text2);
        }

        .page-header .header-actions button.danger:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        .search-wrap {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            position: relative;
            flex-shrink: 0;
        }

        .search-wrap input {
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
        }

        .search-wrap input:focus {
            border-color: var(--primary);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 14px;
            right: 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
        }

        .search-results.show {
            display: block;
        }

        .search-results .item {
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-results .item:hover {
            background: var(--surface);
        }

        .search-results .item .sr-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .list-area {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
        }

        .list-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
        }

        .list-item:hover,
        .list-item:active {
            background: var(--surface2);
        }

        .list-item .li-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 17px;
            flex-shrink: 0;
        }

        .list-item .li-info {
            flex: 1;
            min-width: 0;
        }

        .list-item .li-name {
            font-weight: 600;
            font-size: 15px;
        }

        .list-item .li-last {
            font-size: 13px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item .li-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .list-item .li-time {
            font-size: 11px;
            color: var(--text2);
        }

        .badge {
            display: inline-block;
            background: var(--danger);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            padding: 1px 6px;
            border-radius: 10px;
            text-align: center;
        }

        .msg-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 16px 14px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .msg-loading {
            text-align: center;
            padding: 20px;
            color: var(--text2);
            font-size: 12px;
            cursor: pointer;
        }

        .msg-loading:hover {
            color: var(--primary);
        }

        .msg-row {
            display: flex;
            gap: 8px;
            max-width: 80%;
            margin-bottom: 6px;
        }

        .msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .msg-row .m-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            flex-shrink: 0;
        }

        .msg-row.mine .m-avatar {
            display: none;
        }

        .msg-bubble {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: var(--surface2);
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-row.mine .msg-bubble {
            background: var(--primary);
            color: #fff;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text2);
            margin-top: 2px;
        }

        .msg-row.mine .msg-time {
            text-align: right;
        }

        .msg-status {
            font-size: 10px;
            margin-top: 2px;
            text-align: right;
        }

        .msg-status .delivered {
            color: #6eca6e;
        }

        .msg-status .pending {
            color: var(--text2);
        }

        .msg-status .undelivered {
            color: #e5c07b;
        }

        .msg-sender {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 2px;
            padding-left: 4px;
        }

        .msg-row.mine .msg-sender {
            display: none;
        }

        .typing-indicator {
            font-size: 11px;
            color: var(--text2);
            padding: 2px 14px;
            font-style: italic;
        }

        .input-bar {
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: var(--surface);
            flex-shrink: 0;
        }

        .input-bar textarea {
            flex: 1;
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            resize: none;
            min-height: 38px;
            max-height: 120px;
            line-height: 1.4;
            color: var(--text);
        }

        .input-bar textarea:focus {
            border-color: var(--primary);
        }

        .input-bar .btn-send {
            padding: 8px 16px;
            background: var(--primary);
            color: #fff;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .input-bar .btn-send:hover {
            background: var(--primary-dim);
        }

        #bottomNav {
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #bottomNav button {
            flex: 1;
            padding: 8px 0;
            font-size: 11px;
            color: var(--text2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: color 0.15s;
        }

        #bottomNav button .icon {
            font-size: 20px;
        }

        #bottomNav button.active {
            color: var(--primary);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 90%;
            max-width: 360px;
        }

        .modal h3 {
            margin-bottom: 16px;
            font-size: 16px;
        }

        .modal label {
            display: block;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 4px;
        }

        .modal input {
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .modal .err {
            color: var(--danger);
            font-size: 12px;
            margin-bottom: 8px;
            min-height: 18px;
        }

        .modal .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .modal .btn-row .btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text2);
            font-size: 13px;
        }

        @media (max-width: 700px) {
            #app {
                border-left: none;
                border-right: none;
            }

            body {
                font-size: 15px;
            }

            .list-item {
                padding: 14px 16px;
            }

            .list-item .li-avatar {
                width: 48px;
                height: 48px;
                font-size: 18px;
            }

            .list-item .li-name {
                font-size: 16px;
            }

            .list-item .li-last {
                font-size: 14px;
            }

            .msg-bubble {
                font-size: 15px;
                padding: 10px 14px;
            }

            .input-bar textarea {
                font-size: 16px;
                padding: 10px 12px;
            }

            .input-bar .btn-send {
                padding: 12px 20px;
                font-size: 16px;
                min-width: 60px;
            }

            .page-header {
                padding: max(14px, env(safe-area-inset-top)) 16px 14px 16px;
            }

            .input-bar {
                padding: 10px 12px max(10px, env(safe-area-inset-bottom));
            }

            .auth-box {
                padding: 28px 20px;
            }

            .auth-box input {
                padding: 12px;
                font-size: 16px;
            }

            .auth-box .btn {
                padding: 12px;
                font-size: 15px;
            }

            .search-wrap input {
                padding: 10px 14px;
                font-size: 16px;
            }

            .msg-row {
                max-width: 88%;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="authScreen">
            <div class="auth-box">
                <h1>myx-im</h1>
                <div class="sub">Instant Messaging</div>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                    🌓</button><label for="authUser">Username</label><input id="authUser" placeholder="123" value="123"
                    maxlength="20" autocomplete="username" /><label for="authPass">Password</label><input id="authPass"
                    type="password" placeholder="123123" value="123123" maxlength="20"
                    autocomplete="current-password" />
                <div class="err" id="authErr"></div>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="doRegister()">Register</button>
                    <button class="btn btn-outline" onclick="doLogin()">Login</button>
                </div>
            </div>
        </div>

        <div class="page" id="pageChats">
            <div class="page-header">
                <div class="avatar" id="myAvatar"></div>
                <div class="info">
                    <div class="title" id="myName"></div>
                </div>
                <div class="header-actions">
                    <button onclick="toggleTheme()" title="Toggle theme">🌓</button>
                </div>
            </div>
            <div class="list-area" id="convList"></div>
        </div>

        <div class="page" id="pageFriends">
            <div class="page-header">
                <button class="btn-back" onclick="goTo('chats')">←</button>
                <div class="info">
                    <div class="title">Friends</div>
                </div>
            </div>
            <div class="search-wrap">
                <input id="searchInput" placeholder="Search users..." autocomplete="off" oninput="onSearchInput()"
                    onfocus="onSearchInput()" />
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="list-area" id="friendList"></div>
        </div>

        <div class="page" id="pageGroups">
            <div class="page-header">
                <button class="btn-back" onclick="goTo('chats')">←</button>
                <div class="info">
                    <div class="title">Groups</div>
                </div>
                <div class="header-actions">
                    <button onclick="openModal('create')">+ Create</button><button
                        onclick="openModal('join')">Join</button>
                </div>
            </div>
            <div class="list-area" id="groupList"></div>
        </div>

        <div class="page" id="pageChat">
            <div class="page-header">
                <button class="btn-back" onclick="closeChat()">←</button>
                <div class="avatar" id="chAvatar"></div>
                <div class="info">
                    <div class="title" id="chName"></div>
                    <div class="subtitle" id="chStatus"></div>
                </div>
            </div>
            <div class="msg-list" id="msgList">
                <div class="msg-loading" id="loadMore" onclick="loadHistory()">

                </div>
            </div>
            <div class="typing-indicator" id="typingHint" style="display: none"></div>
            <div class="input-bar">
                <textarea id="msgInput" rows="1" placeholder="" onkeydown="onMsgKey(event)"></textarea><button
                    class="btn-send" id="btnSend" onclick="sendMessage()"></button>
            </div>
        </div>

        <div class="page" id="pageGroupChat">
            <div class="page-header">
                <button class="btn-back" onclick="closeGroupChat()">←</button>
                <div class="avatar" id="gchAvatar">👥</div>
                <div class="info">
                    <div class="title" id="gchName"></div>
                    <div class="subtitle" id="gchStatus"></div>
                </div>
            </div>
            <div class="msg-list" id="gmsgList">
                <div class="msg-loading" id="gloadMore" onclick="loadGroupHistory()">

                </div>
            </div>
            <div class="input-bar">
                <textarea id="gmsgInput" rows="1" placeholder="" onkeydown="onGroupMsgKey(event)"></textarea><button
                    class="btn-send" id="gbtnSend" onclick="sendGroupMessage()">
                </button>
            </div>
        </div>

        <div class="page" id="pageSettings">
            <div class="page-header">
                <button class="btn-back" onclick="goTo('chats')">←</button>
                <div class="info">
                    <div class="title"></div>
                </div>
            </div>
            <div class="list-area" style="
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        padding: 40px 20px;
                        gap: 16px;
                    ">
                <div class="avatar" id="meAvatar" style="width: 64px; height: 64px; font-size: 28px"></div>
                <div class="title" id="meName" style="font-size: 18px"></div>
                <div style="width:100%;max-width:300px;display:flex;flex-direction:column;gap:8px">
                    <div id="lblAppearance"
                        style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px"></div>
                    <button id="btnTheme"
                        style="padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;text-align:left;width:100%"></button>
                    <div id="lblLanguage"
                        style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:8px">
                    </div>
                    <button id="btnLang"
                        style="padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;text-align:left;width:100%"></button>
                    <div style="display:flex;width:100%;max-width:300px">
                        <button id="btnLangZh"
                            style="flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm) 0 0 var(--radius-sm);font-size:14px;text-align:center">中文</button>
                        <button id="btnLangEn"
                            style="flex:1;padding:10px;border:1px solid var(--border);border-left:none;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:14px;text-align:center">English</button>
                    </div>
                    <div id="lblAccount"
                        style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:8px">
                    </div>
                    <button id="btnLogout"
                        style="padding:10px 16px;border:1px solid var(--danger);border-radius:var(--radius-sm);font-size:14px;color:var(--danger);text-align:left;width:100%"></button>
                    <button id="btnDeleteAccount"
                        style="padding:10px 16px;border:1px solid var(--danger);border-radius:var(--radius-sm);font-size:14px;color:var(--danger);text-align:left;width:100%"></button>
                </div>
            </div>
        </div>

        <div id="bottomNav" style="display: none">
            <button id="navChats" class="active" onclick="goTo('chats')">
                <span class="icon">💬</span><span>Chats</span>
            </button>
            <button id="navFriends" onclick="goTo('friends')">
                <span class="icon">👤</span><span>Friends</span>
            </button>
            <button id="navGroups" onclick="goTo('groups')">

    <script>
        // ── i18n ──
        const I18N = {
            zh: {

            },
            en: {
                appName: "myx-im", appSub: "Instant Messaging",
                username: "Username", password: "Password",
                register: "Register", login: "Login",
                registered: "Registered! Now login.", userExists: "User exists, try login.",
                badToken: "Bad token", serverErr: "Server error", cantReach: "Cannot reach server",
                fillAll: "Fill all fields", userLen: "Username ≥3, password ≥6 chars",
                chats: "Chats", groups: "Groups", friends: "Friends", settings: "Settings",
                searchUsers: "Search users...",
                noConvs: "No conversations yet.<br>Search for users to start chatting.",
                groupsTitle: "Groups", create: "+ Create", join: "Join",
                noGroups: "No groups yet.<br>Create or join a group to start.",
                friendsTitle: "Friends",
                noFriends: "No friends yet.<br>Search users and add them as friends.",
                typeMsg: "Type a message...", send: "Send",
                loadEarlier: "Load earlier messages", noMsgsYet: "No messages yet",
                noEarlier: "No earlier messages", allLoaded: "All messages loaded",
                noMsgs: "No messages",
                noMsgs: "No messages",
                online: "online", offline: "offline", reconnecting: "reconnecting...",
                sending: "Sending...", sent: "Sent", delivered: "Read", read: "Read",
                membersBy: " members, by ",
                members: " members",
                profile: "Profile", language: "Language",
                chinese: "中文", english: "English",
                appearance: "Appearance", account: "Account",
                themeToggle: "🌓 Toggle Theme",
                logout: "Logout", deleteAccount: "Delete Account",
                deleting: "Deleting...",
                confirmDelete: "Delete your account and all data? This cannot be undone.",
                deleted: "Account deleted.", deleteFailed: "Failed: ",
                openChatFirst: "Open a chat first",
                loggedFromOther: "Logged in from another device",
                isTyping: " is typing...",
                group: "group",
                createGroup: "Create Group", groupName: "Group Name", groupNameRequired: "Enter a group name",
                cancel: "Cancel",
                joinGroup: "Join Group", searchByName: "Search by name",
                addFriend: "+ Add",
                searchFailed: "Search failed", joinFailed: "Join failed",
                friendAdded: "✓ Friend",
            }
        };
        let lang = localStorage.getItem("lang") || "zh";
        function t(key) { return (I18N[lang] && I18N[lang][key]) || I18N.en[key] || key; }
        function setLang(l) { lang = l; localStorage.setItem("lang", l); rerenderUI(); renderAuth(); }
        function rerenderUI() {
            document.title = me ? me.username + " - " + t("appName") : t("appName");
            ["Chats", "Groups", "Friends", "Settings"].forEach(id => {
                const el = $("nav" + id);
                if (el) el.querySelector("span:last-child").textContent = t(id.toLowerCase());
            });
            // Page headers & static UI
            $("searchInput").placeholder = t("searchUsers");
            const gh = document.querySelector("#pageGroups .page-header .title");
            if (gh) gh.textContent = t("groupsTitle");
            const fh = document.querySelector("#pageFriends .page-header .title");
            if (fh) fh.textContent = t("friendsTitle");
            const gb = document.querySelectorAll("#pageGroups .header-actions button");
            if (gb[0]) { gb[0].textContent = t("create"); gb[0].innerHTML = t("create"); }
            if (gb[1]) { gb[1].textContent = t("join"); gb[1].innerHTML = t("join"); }
            // Modals
            const mc = document.querySelector("#modalCreateGroup h3");
            if (mc) mc.textContent = t("createGroup");
            const mj = document.querySelector("#modalJoinGroup h3");
            if (mj) mj.textContent = t("joinGroup");
            document.querySelector('#modalCreateGroup label[for="groupName"]').textContent = t("groupName");
            const mcb = document.querySelectorAll("#modalCreateGroup .btn-row button");
            if (mcb[0]) mcb[0].textContent = t("cancel");
            if (mcb[1]) mcb[1].textContent = t("create");
            document.querySelector('#modalJoinGroup label[for="groupSearch"]').textContent = t("searchByName");
            $("groupSearch").placeholder = t("searchByName");
            const mjb = document.querySelectorAll("#modalJoinGroup .btn-row button");
            if (mjb[0]) mjb[0].textContent = t("cancel");
            $("groupName").placeholder = t("groupName");
            renderConvList(); renderGroupList(); renderFriendList();
            if (currentPage === "settings") renderSettings();
        }
        function renderAuth() {
            const a = $("authScreen");
            if (!a || a.style.display === "none") return;
            a.querySelector("h1").textContent = t("appName");
            a.querySelector(".sub").textContent = t("appSub");
            a.querySelector('label[for="authUser"]').textContent = t("username");
            a.querySelector('label[for="authPass"]').textContent = t("password");
            a.querySelector(".btn-primary").textContent = t("register");
            a.querySelector(".btn-outline").textContent = t("login");
        }
        // renderAuth() is called below, after $ is defined

        // ── User & Connection ──
        let me = null,                 // {uid, username, token} — current logged-in user
            ws = null,                 // WebSocket instance for IM push + commands
            // ── Peer / Chat state ──
            peers = {},                // {uid: {username}} — cached peer usernames
            messages = [],             // currently loaded private chat messages
            groupMessages = [];        // currently loaded group chat messages
        let activePeer = null,         // UUID of the private chat currently being viewed
            activeGroup = null,        // UUID of the group chat currently being viewed
            convCache = [],            // cached conversation list from /api/conversations
            unreadCounts = {},         // {peer_uid: count} — private chat unread badges
            groupUnreadCounts = {};    // {group_id: count} — group chat unread badges
        // ── Message tracking ──
        let pendingMsgs = {},          // {seq: {el, msg}} — sent messages awaiting ACK
            msgById = {},              // {msg_id: DOM element} — for status updates (✓ Read)
            // ── Typing indicator ──
            typingTimer = null,        // setTimeout handle for debounced sendTyping
            typingTimeout = null;      // setTimeout handle for "is typing..." fade-out
        // ── Lists & navigation ──
        let groupCache = [],           // cached group list from /api/group/list
            friendCache = [],          // cached friend list from /api/friend/list
            currentPage = null;        // 'chats' | 'groups' | 'friends' | 'chat' | 'groupChat' | 'me'
        const PAGE_SIZE = 40;
        const $ = (id) => document.getElementById(id);
        const authScreen = $("authScreen"),
            bottomNav = $("bottomNav");
        const allPages = [
            $("pageChats"),
            $("pageGroups"),
            $("pageFriends"),
            $("pageChat"),
            $("pageGroupChat"),
            $("pageSettings"),
        ];
        renderAuth(); // set initial i18n text on auth screen

        function goTo(page) {
            allPages.forEach((p) => p.classList.remove("active"));
            const pg =
                page === "chats"
                    ? $("pageChats")
                    : page === "groups"
                        ? $("pageGroups")
                        : page === "friends"
                            ? $("pageFriends")
                            : page === "chat"
                                ? $("pageChat")
                                : page === "groupChat"
                                    ? $("pageGroupChat")
                                    : $("pageSettings");
            if (pg) pg.classList.add("active");
            currentPage = page;
            document.title = me ? me.username + " - " + t("appName") : t("appName");
            $("navChats").classList.toggle("active", page === "chats");
            $("navGroups").classList.toggle("active", page === "groups");
            $("navFriends").classList.toggle("active", page === "friends");
            $("navSettings").classList.toggle("active", page === "settings");
            if (page === "chats") loadConversations();
            if (page === "groups") loadGroupList();
            if (page === "friends") loadFriendList();
            if (page === "settings") {
                $("meAvatar").textContent = me.username[0].toUpperCase();
                $("meName").textContent = me.username;
                renderSettings();
            }
            bottomNav.style.display = page === "chat" || page === "groupChat" ? "none" : "flex";
            setTimeout(() => {
                const ml = page === "groupChat" ? $("gmsgList") : $("msgList");
                if (ml) ml.scrollTop = ml.scrollHeight;
            }, 50);
        }

        function storageKey() {
            return me ? "mx_status_" + me.uid : null;
        }
        function saveMsgStatus(id, s) {
            const k = storageKey();
            if (!k || !id) return;
            try {
                const d = JSON.parse(localStorage.getItem(k) || "{}");
                d[id] = s;
                const ids = Object.keys(d);
                if (ids.length > 500)
                    ids.slice(0, ids.length - 500).forEach((x) => delete d[x]);
                localStorage.setItem(k, JSON.stringify(d));
            } catch (_) { }
        }
        function getMsgStatus(id) {
            const k = storageKey();
            if (!k || !id) return null;
            try {
                return JSON.parse(localStorage.getItem(k) || "{}")[id] || null;
            } catch (_) {
                return null;
            }
        }

        function toggleTheme() {
            document.body.classList.toggle("light");
            localStorage.setItem(
                "theme",
                document.body.classList.contains("light") ? "light" : "dark",
            );
        }
        if (localStorage.getItem("theme") === "light") document.body.classList.add("light");

        async function api(path, opts = {}) {
            const r = await fetch(path, {
                headers: { "Content-Type": "application/json" },
                ...opts,
            });
            try { return await r.json() } catch (_) {
                return { code: r.status, msg: "Server error" }
            }
        }
        function setErr(m) {
            $("authErr").textContent = m || "";
        }

        async function doRegister() {
            setErr();
            const u = $("authUser").value.trim(),
                p = $("authPass").value;
            if (u.length < 3 || p.length < 6)
                return setErr(t("userLen"));
            try {
                const d = await api("/api/user/register", {
                    method: "POST",
                    body: JSON.stringify({ username: u, password: p }),
                });
                if (d.code === 200) setErr(t("registered"));
                else if (d.code === 409) setErr(t("userExists"));
                else setErr(d.msg);
            } catch (_) {
                setErr(t("cantReach"));
            }
        }
        async function doLogin() {
            setErr();
            const u = $("authUser").value.trim(),
                p = $("authPass").value;
            if (!u || !p) return setErr(t("fillAll"));
            try {
                const d = await api("/api/user/login", {
                    method: "POST",
                    body: JSON.stringify({ username: u, password: p }),
                });
                if (d.code !== 200) return setErr(d.msg);
                try {
                    me = {
                        uid: JSON.parse(atob(d.data.split(".")[1])).user_id,
                        username: u,
                        token: d.data,
                    };
                } catch (_) {
                    return setErr(t("badToken"));
                }
                connectWS();
            } catch (_) {
                setErr(t("cantReach"));
            }
        }

        function doLogout() {
            clearTimeout(reconnectTimer);
            if (ws) ws.close();
            me = null;
            ws = null;
            peers = {};
            messages = [];
            groupMessages = [];
            activePeer = null;
            activeGroup = null;
            convCache = [];
            groupCache = [];
            unreadCounts = {};
            pendingMsgs = {};
            msgById = {};
            authScreen.style.display = "flex";
            bottomNav.style.display = "none";
            allPages.forEach((p) => {
                if (p) p.classList.remove("active");
            });
            currentPage = null;
            $("navSettings").classList.remove("active");
        }
        async function doDeleteAccount() {
            if (!confirm(t("confirmDelete"))) return;
            const b = $("btnDeleteAccount");
            b.textContent = t("deleting");
            b.disabled = true;
            try {
                const d = await api("/api/user/delete", {
                    method: "POST",
                    body: JSON.stringify({ token: me.token }),
                });
                if (d.code === 200) {
                    alert(t("deleted"));
                    doLogout();
                } else {
                    alert(t("deleteFailed") + d.msg);
                    b.textContent = t("deleteAccount");
                    b.disabled = false;
                }
            } catch (_) {
                alert(t("cantReach"));
                b.textContent = t("deleteAccount");
                b.disabled = false;
            }
        }

        let reconnectTimer = null;
        function uuid() {
            if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
            return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
                const r = (Math.random() * 16) | 0;
                return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
            });
        }
        function connectWS() {
            if (!me) return;
            if (ws) {
                ws.onclose = null;
                if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)
                    ws.close();
            }
            ws = new WebSocket(
                `ws://${location.host}/im/ws?token=${encodeURIComponent(me.token)}`,
            );
            ws.onopen = () => {
                clearTimeout(reconnectTimer);
                authScreen.style.display = "none";
                bottomNav.style.display = "flex";
                $("myAvatar").textContent = me.username[0].toUpperCase();
                $("myName").textContent = me.username;
                loadConversations();
                rerenderUI();
                goTo("chats");
            };
            ws.onclose = () => {
                ws = null;
                const s = $("chStatus");
                if (s) {
                    s.textContent = t("reconnecting");
                    s.style.color = "var(--danger)";
                }
                const gs = $("gchStatus");
                if (gs) {
                    gs.textContent = t("reconnecting");
                    gs.style.color = "var(--danger)";
                }
                if (!me) return;
                const d = reconnectTimer ? 5000 : 2000;
                reconnectTimer = setTimeout(connectWS, d);
            };
            ws.onmessage = (e) => {
                try {
                    const m = JSON.parse(e.data);
                    if (m.cmd === "private_push") handlePush(m.data);
                    else if (m.cmd === "group_push") handleGroupPush(m.data);
                    else if (m.cmd === "private_chat_ack") handleAck(m);
                    else if (m.cmd === "group_chat_ack") handleGroupAck(m);
                    else if (m.cmd === "delivery_update") handleDeliveryUpdate(m);
                    else if (m.cmd === "group_delivery_update") handleGroupDeliveryUpdate(m);
                    else if (m.cmd === "typing") handleTyping(m);
                    else if (m.cmd === "kicked") {
                        $("authErr").textContent = t("loggedFromOther");
                        doLogout();
                    }
                } catch (_) { }
            };
        }

        function handlePush(d) {
            const p = d.from_uid === me.uid ? d.to_uid : d.from_uid;
            if (!peers[p] || peers[p].username === "?")
                peers[p] = { username: d.from_uid === me.uid ? "You" : d.from_name || "?" };
            if (activePeer === p && currentPage === "chat") {
                appendMsg(
                    {
                        msg_id: Date.now(),
                        from_uid: d.from_uid,
                        to_uid: d.to_uid,
                        content: d.content,
                        msg_type: d.msg_type,
                        send_time: d.send_time,
                    },
                    null,
                    $("msgList"),
                );
                // Mark peer's messages as seen since we're viewing this chat
                if (ws && ws.readyState === 1)
                    ws.send(JSON.stringify({ cmd: "mark_seen", seq: 0, data: { to_uid: p } }));
                $("chStatus").textContent = t("online");
                $("chStatus").style.color = "var(--accent)";
            } else {
                unreadCounts[p] = (unreadCounts[p] || 0) + 1;
                renderConvList();
            }
            loadConversations();
        }
        function handleGroupPush(d) {
            if (
                activeGroup === d.group_id &&
                currentPage === "groupChat" &&
                d.from_uid !== me.uid
            ) {
                appendGroupMsg(
                    {
                        msg_id: Date.now(),
                        group_id: d.group_id,
                        from_uid: d.from_uid,
                        from_name: d.from_name,
                        content: d.content,
                        msg_type: d.msg_type,
                        send_time: d.send_time,
                    },
                    $("gmsgList"),
                );
                // Mark group as read since we're viewing it
                if (ws && ws.readyState === 1)
                    ws.send(JSON.stringify({ cmd: "mark_group_read", seq: 0, data: { group_id: d.group_id } }));
            }
            groupUnreadCounts[d.group_id] = (groupUnreadCounts[d.group_id] || 0) + 1;
            renderGroupList();
        }

        function handleAck(m) {
            let e = pendingMsgs[m.seq];
            if (!e) {
                for (const k of Object.keys(pendingMsgs)) {
                    if (Number(k) === Number(m.seq)) {
                        e = pendingMsgs[k];
                        break;
                    }
                }
            }
            if (!e) return;
            const s = e.el.querySelector(".msg-status");
            if (m.data && m.data.msg_id) {
                e.msg.msg_id = m.data.msg_id;
                msgById[m.data.msg_id] = e.el;
            }
            if (m.data && m.data.delivered) {
                if (s) s.innerHTML = '<span class="undelivered">\u25F7 ' + t("sent") + '</span>';
                $("chStatus").textContent = t("online");
                $("chStatus").style.color = "var(--accent)";
            } else {
                if (s) s.innerHTML = '<span class="undelivered">\u25F7 ' + t("sent") + '</span>';
                $("chStatus").textContent = t("offline");
                $("chStatus").style.color = "var(--text2)";
            }
            delete pendingMsgs[m.seq];
        }
        function handleDeliveryUpdate(m) {
            const ids = m.data && m.data.msg_ids;
            if (!ids) return;
            for (const mid of ids) {
                const el = msgById[mid];
                if (!el) continue;
                const s = el.querySelector(".msg-status");
                if (s) {
                    s.innerHTML = '<span class="delivered">\u2713 ' + t("read") + '</span>';
                    saveMsgStatus(mid, "read");
                }
            }
        }
        function handleGroupAck(m) {
            console.log('[grpAck] seq=', m.seq, 'msg_id=', m.data && m.data.msg_id, 'raw=', JSON.stringify(m));
            // Map real DB msg_id to DOM for group messages
            let e = pendingMsgs[m.seq];
            if (!e) {
                for (const k of Object.keys(pendingMsgs)) {
                    if (Number(k) === Number(m.seq)) { e = pendingMsgs[k]; break }
                }
            }
            if (!e) { console.log('[grpAck] no pending msg for seq=', m.seq, 'keys=', Object.keys(pendingMsgs)); return; }
            if (m.data && m.data.msg_id) {
                e.msg.msg_id = m.data.msg_id;
                msgById[m.data.msg_id] = e.el;
                console.log('[grpAck] mapped msg_id=', m.data.msg_id, '->', !!e.el);
            }
            delete pendingMsgs[m.seq];
        }
        function handleGroupDeliveryUpdate(m) {
            console.log('[grpDelUp]', JSON.stringify(m.data));
            const statuses = m.data && m.data.msg_statuses;
            if (!statuses) return;
            for (const s of statuses) {
                const el = msgById[s.msg_id];
                if (!el) { console.log('[grpDelUp] no DOM for msg_id=', s.msg_id, 'msgById keys=', Object.keys(msgById).slice(0, 5)); continue; }
                const st = el.querySelector(".msg-status");
                if (st) {
                    st.innerHTML = '<span class="delivered">\u2713 ' + t("read") + ' ' + s.read + '/' + s.total + '</span>';
                    console.log('[grpDelUp] updated msg_id=', s.msg_id, '->', s.read, '/', s.total);
                }
            }
        }
        function handleTyping(m) {
            const f = m.data && m.data.from_uid;
            if (!f || activePeer !== f || currentPage !== "chat") return;
            const h = $("typingHint");
            h.textContent = ((peers[f] && peers[f].username) || "?") + t("isTyping");
            h.style.display = "block";
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                h.style.display = "none";
            }, 3000);
        }
        function sendTyping() {
            if (!activePeer || !ws || ws.readyState !== 1) return;
            ws.send(JSON.stringify({ cmd: "typing", seq: 0, data: { to_uid: activePeer } }));
        }

        async function loadConversations() {
            if (!me) return;
            try {
                const d = await api("/api/conversations?token=" + encodeURIComponent(me.token));
                if (d.code !== 200) return;
                convCache = d.data || [];
                for (const c of convCache) {
                    peers[c.peer_uid] = { username: c.peer_name };
                }
                renderConvList();
            } catch (_) { }
        }
        function escHtml(s) {
            const d = document.createElement("div");
            d.textContent = s || "";
            return d.innerHTML;
        }
        // Clone a <template> and return its firstElementChild
        function tpl(id) {
            return $("tpl" + id).content.firstElementChild.cloneNode(true);
        }

        function renderConvList() {
            const el = $("convList");
            el.replaceChildren();
            if (convCache.length === 0) {
                const d = tpl("EmptyState");
                d.innerHTML = t("noConvs");
                el.appendChild(d);
                return;
            }
            for (const c of convCache) {
                const item = tpl("ConvItem");
                item.querySelector(".li-avatar").textContent = (c.peer_name ||
                    "?")[0].toUpperCase();
                const nameEl = item.querySelector(".li-name");
                nameEl.textContent = c.peer_name;
                if (unreadCounts[c.peer_uid]) {
                    const badge = document.createElement("span");
                    badge.className = "badge";
                    badge.textContent = unreadCounts[c.peer_uid];
                    nameEl.appendChild(badge);
                }
                item.querySelector(".li-last").textContent = c.last_msg;
                item.querySelector(".li-time").textContent = new Date(
                    c.last_time,
                ).toLocaleTimeString(lang === "zh" ? "zh-CN" : "en-US", { hour: "2-digit", minute: "2-digit" });
                item.onclick = () => openChat(c.peer_uid, c.peer_name);
                el.appendChild(item);
            }
        }

        function openChat(uid, name) {
            activePeer = uid;
            activeGroup = null;
            if (unreadCounts[uid]) {
                delete unreadCounts[uid];
            }
            if (!peers[uid] || peers[uid].username === "?") peers[uid] = { username: name };
            $("chAvatar").textContent = ((peers[uid] && peers[uid].username) ||
                name ||
                "?")[0].toUpperCase();
            $("chName").textContent = (peers[uid] && peers[uid].username) || name;
            $("chStatus").textContent = "";
            $("chStatus").style.color = "";
            messages = [];
            const lm = $("loadMore");
            $("msgList").replaceChildren(lm);
            lm.style.display = "block";
            $("loadMore").textContent = t("loadEarlier");
            $("loadMore").style.cursor = "pointer";
            $("msgInput").value = "";
            $("msgInput").placeholder = t("typeMsg");
            $("btnSend").textContent = t("send");
            $("typingHint").style.display = "none";
            clearTimeout(typingTimeout);
            goTo("chat");
            loadHistory();
        }
        function closeChat() {
            activePeer = null;
            clearTimeout(typingTimeout);
            $("typingHint").style.display = "none";
            messages = [];
            goTo("chats");
            renderConvList();
            setTimeout(loadConversations, 300);
        }

        async function loadHistory() {
            if (!activePeer || !me) return;
            const before = messages.length > 0 ? messages[0].msg_id : null;
            let url =
                "/api/message/history?token=" +
                encodeURIComponent(me.token) +
                "&peer_uid=" +
                activePeer +
                "&limit=" +
                PAGE_SIZE;
            if (before) url += "&before=" + before;
            const d = await api(url),
                lm = $("loadMore");
            if (d.code !== 200 || !d.data) {
                lm.textContent = t("noMsgsYet");
                lm.style.cursor = "default";
                return;
            }
            const items = d.data;
            if (items.length === 0) {
                lm.textContent = t("noEarlier");
                lm.style.cursor = "default";
                return;
            }
            if (items.length < PAGE_SIZE) {
                lm.textContent = t("allLoaded");
                lm.style.cursor = "default";
            } else {
                lm.textContent = t("loadEarlier");
                lm.style.cursor = "pointer";
            }
            for (let i = 0; i < items.length; i++) messages.unshift(items[i]);
            renderMessages();
        }
        function renderMessages() {
            const ml = $("msgList"),
                lm = $("loadMore");
            ml.replaceChildren(lm);
            for (const m of messages) appendMsg(m, null, ml);
            ml.scrollTop = ml.scrollHeight;
        }

        function appendMsg(m, s, ml) {
            const isMine = m.from_uid === me.uid;
            const nm = isMine
                ? me.username
                : (peers[m.from_uid] && peers[m.from_uid].username) || "?";
            const time = new Date(Number(m.send_time)).toLocaleTimeString(lang === "zh" ? "zh-CN" : "en-US", {
                hour: "2-digit",
                minute: "2-digit",
            });
            if (!s && isMine && m.msg_id) {
                const sv = getMsgStatus(m.msg_id);
                if (sv === "read") s = '<span class="delivered">\u2713 ' + t("read") + '</span>';
                else if (m.seen) s = '<span class="delivered">\u2713 ' + t("read") + '</span>';
                else s = '<span class="undelivered">\u25F7 ' + t("sent") + '</span>';
            }
            const div = tpl("MsgRow");
            if (isMine) div.classList.add("mine");
            div.querySelector(".m-avatar").textContent = nm[0].toUpperCase();
            div.querySelector(".msg-bubble").textContent = m.content;
            div.querySelector(".msg-time").textContent = time;
            const status = div.querySelector(".msg-status");
            if (s) status.innerHTML = s;
            ml.appendChild(div);
            ml.scrollTop = ml.scrollHeight;
            if (m.msg_id && isMine) msgById[m.msg_id] = div;
            return div;
        }

        function sendMessage() {
            const b = $("btnSend"),
                c = $("msgInput").value.trim();
            if (!activePeer) {
                b.textContent = t("openChatFirst");
                b.style.background = "var(--danger)";
                setTimeout(() => {
                    b.textContent = "Send";
                    b.style.background = "var(--primary)";
                }, 1500);
                return;
            }
            if (!c) return;
            if (!ws || ws.readyState !== 1) {
                b.textContent = t("reconnecting");
                b.style.background = "var(--danger)";
                connectWS();
                setTimeout(() => {
                    b.textContent = t("send");
                    b.style.background = "var(--primary)";
                }, 2000);
                return;
            }
            const seq = Date.now(),
                cid = uuid(),
                msg = {
                    msg_id: seq,
                    from_uid: me.uid,
                    to_uid: activePeer,
                    content: c,
                    msg_type: 1,
                    send_time: Date.now(),
                },
                el = appendMsg(
                    msg,
                    '<span class="pending">\u25F7 ' + t("sending") + '</span>',
                    $("msgList"),
                );
            pendingMsgs[seq] = { el, msg };
            ws.send(
                JSON.stringify({
                    cmd: "private_chat",
                    seq,
                    data: { to_uid: activePeer, content: c, msg_type: 1, client_msg_id: cid, from_name: me.username },
                }),
            );
            $("msgInput").value = "";
            $("msgInput").style.height = "auto";
            $("msgInput").focus();
        }
        function onMsgKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
                return;
            }
            clearTimeout(typingTimer);
            typingTimer = setTimeout(sendTyping, 500);
            setTimeout(() => {
                const ta = $("msgInput");
                ta.style.height = "auto";
                ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
            }, 0);
        }

        function openGroupChat(gid, gn) {
            activeGroup = gid;
            activePeer = null;
            if (groupUnreadCounts[gid]) delete groupUnreadCounts[gid];
            if (!peers[gid]) peers[gid] = { username: gn };
            $("gchName").textContent = gn;
            $("gchStatus").textContent = t("group");
            groupMessages = [];
            const glm = $("gloadMore");
            $("gmsgList").replaceChildren(glm);
            glm.style.display = "block";
            $("gloadMore").textContent = t("loadEarlier");
            $("gloadMore").style.cursor = "pointer";
            $("gmsgInput").value = "";
            $("gmsgInput").placeholder = t("typeMsg");
            $("gbtnSend").textContent = t("send");
            goTo("groupChat");
            loadGroupHistory();
        }
        function closeGroupChat() {
            activeGroup = null;
            groupMessages = [];
            goTo("groups");
            loadGroupList();
        }

        async function loadGroupHistory() {
            if (!activeGroup || !me) return;
            const before = groupMessages.length > 0 ? groupMessages[0].msg_id : null;
            let url =
                "/api/group/history?token=" +
                encodeURIComponent(me.token) +
                "&group_id=" +
                activeGroup +
                "&limit=" +
                PAGE_SIZE;
            if (before) url += "&before=" + before;
            const d = await api(url),
                lm = $("gloadMore");
            if (d.code !== 200 || !d.data) {
                lm.textContent = t("noMsgs");
                lm.style.cursor = "default";
                return;
            }
            const items = d.data;
            if (items.length === 0) {
                lm.textContent = t("noEarlier");
                lm.style.cursor = "default";
                return;
            }
            if (items.length < PAGE_SIZE) {
                lm.textContent = t("allLoaded");
                lm.style.cursor = "default";
            } else {
                lm.textContent = t("loadEarlier");
                lm.style.cursor = "pointer";
            }
            for (let i = 0; i < items.length; i++) groupMessages.unshift(items[i]);
            renderGroupMessages();
        }
        function renderGroupMessages() {
            const ml = $("gmsgList"),
                glm = $("gloadMore");
            ml.replaceChildren(glm);
            for (const m of groupMessages) appendGroupMsg(m, ml);
            ml.scrollTop = ml.scrollHeight;
        }
        function appendGroupMsg(m, ml) {
            const isMine = m.from_uid === me.uid;
            const nm = m.from_name || "?";
            const time = new Date(Number(m.send_time)).toLocaleTimeString(lang === "zh" ? "zh-CN" : "en-US", {
                hour: "2-digit",
                minute: "2-digit",
            });
            const div = tpl("GroupMsgRow");
            if (isMine) div.classList.add("mine");
            div.querySelector(".m-avatar").textContent = nm[0].toUpperCase();
            // Show sender name above bubble for other people's messages
            const sender = div.querySelector(".msg-sender");
            sender.textContent = isMine ? "" : nm;
            const bubble = div.querySelector(".msg-bubble");
            bubble.textContent = m.content;
            div.querySelector(".msg-time").textContent = time;
            if (isMine && m.msg_id) {
                // Show read status from history (read_count/total), or default to Sent
                if (m.read_count > 0 && m.total > 0) {
                    div.querySelector(".msg-status").innerHTML =
                        '<span class="delivered">\u2713 ' + t("read") + ' ' + m.read_count + '/' + m.total + '</span>';
                } else {
                    div.querySelector(".msg-status").innerHTML = '<span class="undelivered">\u25F7 ' + t("sent") + '</span>';
                }
                msgById[m.msg_id] = div;
            }
            ml.appendChild(div);
            ml.scrollTop = ml.scrollHeight;
            return div;
        }
        function sendGroupMessage() {
            if (!ws || ws.readyState !== 1 || !activeGroup) return;
            const c = $("gmsgInput").value.trim();
            if (!c) return;
            const seq = Date.now(),
                cid = uuid();
            ws.send(
                JSON.stringify({
                    cmd: "group_chat",
                    seq,
                    data: {
                        group_id: activeGroup,
                        content: c,
                        msg_type: 1,
                        client_msg_id: cid,
                        from_name: me.username,
                    },
                }),
            );
            const msg = {
                msg_id: seq,
                group_id: activeGroup,
                from_uid: me.uid,
                from_name: me.username,
                content: c,
                msg_type: 1,
                send_time: Date.now(),
            },
                el = appendGroupMsg(msg, $("gmsgList"));
            pendingMsgs[seq] = { el, msg };
            $("gmsgInput").value = "";
            $("gmsgInput").style.height = "auto";
            $("gmsgInput").focus();
        }
        function onGroupMsgKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendGroupMessage();
                return;
            }
            setTimeout(() => {
                const ta = $("gmsgInput");
                ta.style.height = "auto";
                ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
            }, 0);
        }

        async function loadGroupList() {
            if (!me) return;
            const d = await api("/api/group/list?token=" + encodeURIComponent(me.token));
            if (d.code !== 200) return;
            groupCache = d.data || [];
            renderGroupList();
        }
        function renderGroupList() {
            const el = $("groupList");
            el.replaceChildren();
            if (groupCache.length === 0) {
                const d = tpl("EmptyState");
                d.innerHTML = t("noGroups");
                el.appendChild(d);
                return;
            }
            for (const g of groupCache) {
                const item = tpl("GroupItem");
                item.querySelector(".li-name").textContent = g.name;
                if (groupUnreadCounts[g.group_id]) {
                    const badge = document.createElement("span");
                    badge.className = "badge";
                    badge.textContent = groupUnreadCounts[g.group_id];
                    item.querySelector(".li-name").appendChild(badge);
                }
                item.querySelector(".li-last").textContent = g.member_count + t("membersBy") + (g.owner_name || "?");
                item.onclick = () => openGroupChat(g.group_id, g.name);
                el.appendChild(item);
            }
        }

        async function loadFriendList() {
            if (!me) return;
            const d = await api("/api/friend/list?token=" + encodeURIComponent(me.token));
            if (d.code !== 200) return;
            friendCache = d.data || [];
            renderFriendList();
        }
        function renderFriendList() {
            const el = $("friendList");
            el.replaceChildren();
            if (friendCache.length === 0) {
                const d = tpl("EmptyState");
                d.innerHTML = t("noFriends");
                el.appendChild(d);
                return;
            }
            for (const f of friendCache) {
                const item = tpl("ConvItem");
                item.querySelector(".li-avatar").textContent = f.username[0].toUpperCase();
                item.querySelector(".li-name").textContent = f.username;
                item.querySelector(".li-last").textContent = "";
                item.querySelector(".li-time").textContent = "";
                item.onclick = () => openChat(f.friend_id, f.username);
                el.appendChild(item);
            }
        }
        async function addFriend(uid, name) {
            if (!me) return;
            const d = await api("/api/friend/add", {
                method: "POST",
                body: JSON.stringify({ token: me.token, peer_uid: uid }),
            });
            if (d.code === 200) {
                const btn = document.getElementById("btnAddFriend");
                if (btn) { btn.textContent = "✓ Friend"; btn.disabled = true }
            }
        }

        function openModal(t) {
            $("modalOverlay").classList.add("show");
            $("groupErr").textContent = "";
            $("joinGroupErr").textContent = "";
            if (t === "create") {
                $("modalCreateGroup").style.display = "block";
                $("modalJoinGroup").style.display = "none";
                $("groupName").focus();
            } else {
                $("modalCreateGroup").style.display = "none";
                $("modalJoinGroup").style.display = "block";
                $("groupSearch").focus();
                $("groupSearch").value = "";
                $("groupSearchResults").replaceChildren();
            }
        }
        function renderSettings() {
            const page = $("pageSettings");
            page.querySelector(".page-header .title").textContent = t("profile");
            $("lblAppearance").textContent = t("appearance");
            $("btnTheme").textContent = t("themeToggle");
            $("btnTheme").onclick = toggleTheme;
            $("lblLanguage").textContent = t("language");
            $("btnLangZh").textContent = t("chinese");
            $("btnLangEn").textContent = t("english");
            $("btnLangZh").onclick = () => { if (lang !== "zh") setLang("zh"); };
            $("btnLangEn").onclick = () => { if (lang !== "en") setLang("en"); };
            // Highlight active language
            $("btnLangZh").style.background = lang === "zh" ? "var(--primary)" : "";
            $("btnLangZh").style.color = lang === "zh" ? "#fff" : "";
            $("btnLangEn").style.background = lang === "en" ? "var(--primary)" : "";
            $("btnLangEn").style.color = lang === "en" ? "#fff" : "";
            $("lblAccount").textContent = t("account");
            $("btnLogout").textContent = t("logout");
            $("btnLogout").onclick = doLogout;
            $("btnDeleteAccount").textContent = t("deleteAccount");
            $("btnDeleteAccount").onclick = doDeleteAccount;
        }
        function closeModal() {
            $("modalOverlay").classList.remove("show");
        }
        async function doCreateGroup() {
            const n = $("groupName").value.trim();
            if (!n) {
                $("groupErr").textContent = t("groupNameRequired");
                return;
            }
            const d = await api("/api/group/create", {
                method: "POST",
                body: JSON.stringify({ token: me.token, name: n }),
            });
            if (d.code !== 200) {
                $("groupErr").textContent = d.msg;
                return;
            }
            closeModal();
            $("groupName").value = "";
            loadGroupList();
        }
        let groupSearchTimer;
        async function onGroupSearch() {
            clearTimeout(groupSearchTimer);
            const q = $("groupSearch").value.trim();
            const el = $("groupSearchResults");
            const err = $("joinGroupErr");
            if (!q) { el.replaceChildren(); el.classList.remove("show"); return }
            groupSearchTimer = setTimeout(async () => {
                const d = await api("/api/group/search?token=" + encodeURIComponent(me.token) + "&q=" + encodeURIComponent(q) + "&limit=10");
                if (d.code !== 200 || !d.data) { err.textContent = d.msg || t("searchFailed"); return }
                err.textContent = "";
                el.replaceChildren();
                for (const g of d.data) {
                    const item = tpl("SearchItem");
                    item.querySelector(".sr-avatar").textContent = g.name[0].toUpperCase();
                    const info = item.querySelector("div:nth-of-type(2)");
                    info.textContent = g.name;
                    const desc = document.createElement("small");
                    desc.textContent = g.member_count + t("membersBy") + (g.owner_name || "?");
                    desc.style.color = "var(--text2)";
                    info.appendChild(desc);
                    // Hide add-friend button in group search
                    const addBtn = item.querySelector(".btn-add-friend");
                    if (addBtn) addBtn.style.display = "none";
                    item.onclick = async () => {
                        const r = await api("/api/group/join", { method: "POST", body: JSON.stringify({ token: me.token, group_id: g.group_id }) });
                        if (r.code === 200) { closeModal(); loadGroupList() }
                        else err.textContent = r.msg || t("joinFailed");
                    };
                    el.appendChild(item);
                }
                el.classList.add("show");
            }, 300);
        }

        let searchTimer;
        async function onSearchInput() {
            clearTimeout(searchTimer);
            const q = $("searchInput").value.trim();
            if (!q) {
                $("searchResults").classList.remove("show");
                return;
            }
            searchTimer = setTimeout(async () => {
                const d = await api(
                    "/api/user/search?token=" +
                    encodeURIComponent(me.token) +
                    "&q=" +
                    encodeURIComponent(q) +
                    "&limit=8",
                );
                if (d.code !== 200 || !d.data) return;
                const el = $("searchResults");
                el.replaceChildren();
                for (const u of d.data) {
                    const item = tpl("SearchItem");
                    item.querySelector(".sr-avatar").textContent = u.username[0].toUpperCase();
                    item.querySelector("div:nth-of-type(2)").textContent = u.username;
                    item.querySelector("div:nth-of-type(2)").onclick = () => startChat(u.id, u.username);
                    const btn = item.querySelector(".btn-add-friend");
                    btn.textContent = t("addFriend");
                    btn.onclick = (e) => { e.stopPropagation(); addFriend(u.id, u.username) };
                    el.appendChild(item);
                }
                el.classList.add("show");
            }, 300);
        }
        function startChat(uid, name) {
            $("searchInput").value = "";
            $("searchResults").classList.remove("show");
            peers[uid] = { username: name };
            const ex = convCache.find((c) => c.peer_uid === uid);
            if (!ex)
                convCache.unshift({
                    peer_uid: uid,
                    peer_name: name,
                    last_msg: "",
                    last_time: Date.now(),
                    last_msg_type: 1,
                    last_msg_id: 0,
                });
            renderConvList();
            openChat(uid, name);
            setTimeout(loadConversations, 500);
        }
        document.addEventListener("click", (e) => {
            if (!e.target.closest(".search-wrap")) $("searchResults").classList.remove("show");
        });
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", () => {
                if (window.innerHeight - window.visualViewport.height > 100) {
                    const ml = currentPage === "groupChat" ? $("gmsgList") : $("msgList");
                    if (ml) ml.scrollTop = ml.scrollHeight;
                }
            });
        }
    </script>
</body>

</html>
