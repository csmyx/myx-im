<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>myx-im</title>
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text2: #888;
            --primary: #4a9eff;
            --primary-dim: #3a7ecc;
            --accent: #6eca6e;
            --danger: #e05555;
            --radius: 10px;
            --radius-sm: 6px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --sidebar-w: 320px;
        }

        /* ===== Reset ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100dvh;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font: 14px/1.5 var(--font);
            background: var(--bg);
            color: var(--text);
            transition: background .3s, color .3s;
        }

        body.light {
            --bg: #f5f5f5;
            --surface: #fff;
            --surface2: #f0f0f0;
            --border: #ddd;
            --text: #222;
            --text2: #666;
            --primary: #007aff;
            --primary-dim: #0056cc;
        }

        input,
        button {
            font: inherit;
            color: inherit;
            border: none;
            outline: none;
            background: none;
        }

        button {
            cursor: pointer;
        }

        input {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
            background-clip: content-box;
        }

        /* ===== Layout ===== */
        #app {
            display: flex;
            height: 100%;
        }

        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }

        #chatArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #noChat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            font-size: 14px;
        }

        /* ===== Auth Screen ===== */
        #authScreen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 50;
        }

        .auth-box {
            position: relative;
            width: 100%;
            max-width: 340px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 24px;
        }

        .auth-box h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 6px;
        }

        .auth-box .sub {
            text-align: center;
            color: var(--text2);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .auth-box label {
            display: block;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 4px;
            margin-top: 12px;
        }

        .auth-box input {
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
        }

        .auth-box input:focus {
            border-color: var(--primary);
        }

        .auth-box .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .auth-box .btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dim);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--surface2);
        }

        .auth-box .err {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            min-height: 18px;
        }

        /* ===== Sidebar ===== */
        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .sidebar-header .info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-header .name {
            font-weight: 600;
            font-size: 15px;
        }

        .sidebar-header .uid-text {
            font-size: 11px;
            color: var(--text2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-header .btn-logout {
            padding: 6px 10px;
            font-size: 12px;
            color: var(--text2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .sidebar-header .btn-logout:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        .search-wrap {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .search-wrap input {
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
        }

        .search-wrap input:focus {
            border-color: var(--primary);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 14px;
            right: 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
        }

        .search-results.show {
            display: block;
        }

        .search-results .item {
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-results .item:hover {
            background: var(--surface);
        }

        .search-results .item .sr-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab-bar button {
            flex: 1;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            border-bottom: 2px solid transparent;
            transition: all .15s;
        }

        .tab-bar button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .bottom-nav {
            display: none;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .bottom-nav .nav-inner {
            display: flex;
        }

        .bottom-nav button {
            flex: 1;
            padding: 8px 0;
            font-size: 11px;
            color: var(--text2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .bottom-nav button .icon {
            font-size: 20px;
        }

        .bottom-nav button.active {
            color: var(--primary);
        }

        .theme-toggle {
            font-size: 18px;
            padding: 4px 6px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            opacity: .5;
            background: transparent;
            border: none;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        @media (max-width: 700px) {
            .bottom-nav {
                display: block;
            }
        }

        .conv-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background .15s;
        }

        .conv-item:hover {
            background: var(--surface2);
        }

        .conv-item.active {
            background: var(--surface2);
            border-left: 3px solid var(--primary);
        }

        .conv-item .c-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .conv-item .c-info {
            flex: 1;
            min-width: 0;
        }

        .conv-item .c-name {
            font-weight: 600;
            font-size: 14px;
        }

        .conv-item .c-last {
            font-size: 12px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-item .c-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .conv-item .c-time {
            font-size: 11px;
            color: var(--text2);
        }

        .badge {
            display: inline-block;
            background: var(--danger);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }

        /* ===== Chat Header ===== */
        .chat-header {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
        }

        .chat-header .btn-back {
            display: none;
            padding: 4px 8px;
            font-size: 18px;
            color: var(--text2);
        }

        .chat-header .ch-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .chat-header .ch-name {
            font-weight: 600;
            font-size: 15px;
        }

        .chat-header .ch-status {
            font-size: 11px;
            color: var(--text2);
        }

        /* ===== Messages ===== */
        .msg-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 16px 18px;
            scroll-behavior: smooth;
        }

        .msg-loading {
            text-align: center;
            padding: 20px;
            color: var(--text2);
            font-size: 12px;
            cursor: pointer;
        }

        .msg-loading:hover {
            color: var(--primary);
        }

        .msg-row {
            display: flex;
            gap: 8px;
            max-width: 75%;
            margin-bottom: 6px;
        }

        .msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row .m-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            flex-shrink: 0;
        }

        .msg-row.mine .m-avatar {
            background: var(--primary);
            color: #fff;
        }

        .msg-bubble {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: var(--surface2);
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-row.mine .msg-bubble {
            background: var(--primary);
            color: #fff;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text2);
            margin-top: 2px;
        }

        .msg-status {
            font-size: 10px;
            margin-top: 2px;
            text-align: right;
        }

        .msg-status .delivered {
            color: #6eca6e;
        }

        .msg-status .pending {
            color: var(--text2);
        }

        .msg-status .undelivered {
            color: #e5c07b;
        }

        .typing-indicator {
            font-size: 11px;
            color: var(--text2);
            padding: 2px 18px;
            font-style: italic;
        }

        /* ===== Input Bar ===== */
        .input-bar {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: var(--surface);
        }

        .input-bar textarea {
            flex: 1;
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            resize: none;
            min-height: 38px;
            max-height: 120px;
            line-height: 1.4;
            color: var(--text);
        }

        .input-bar textarea:focus {
            border-color: var(--primary);
        }

        .input-bar .btn-send {
            padding: 8px 16px;
            background: var(--primary);
            color: #fff;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
        }

        .input-bar .btn-send:hover {
            background: var(--primary-dim);
        }

        .input-bar .btn-send:disabled {
            opacity: .4;
            cursor: default;
        }

        /* ===== Responsive ===== */
        @media (max-width: 700px) {
            :root {
                --sidebar-w: 100%;
            }

            body {
                font-size: 15px;
                overscroll-behavior: none;
                -webkit-overflow-scrolling: touch;
            }

            #app {
                height: 100dvh;
                height: 100vh;
            }

            #sidebar {
                width: 100%;
                min-width: 100%;
            }

            #main {
                display: none;
            }

            #main.chat-open {
                display: flex;
            }

            .chat-open #sidebar {
                display: none;
            }

            .chat-open #main {
                display: flex;
            }

            /* Safe area padding */
            .sidebar-header {
                padding: max(14px, env(safe-area-inset-top)) 16px 14px 16px;
            }

            .chat-header {
                padding: max(12px, env(safe-area-inset-top)) 16px 12px 16px;
            }

            .chat-header .btn-back {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 32px;
                height: 32px;
                padding: 0;
                font-size: 20px;
                flex-shrink: 0;
            }

            .input-bar {
                padding: 10px 12px max(10px, env(safe-area-inset-bottom));
            }

            /* Larger touch targets */
            .conv-item {
                padding: 14px 16px;
            }

            .conv-item .c-avatar {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }

            .conv-item .c-name {
                font-size: 15px;
            }

            .conv-item .c-last {
                font-size: 13px;
            }

            .sidebar-header .btn-logout {
                padding: 8px 14px;
                font-size: 13px;
            }

            /* Wider messages on mobile */
            .msg-list {
                padding: 12px 10px;
            }

            .msg-row {
                max-width: 88%;
            }

            .msg-bubble {
                font-size: 15px;
                padding: 10px 14px;
            }

            .msg-row .m-avatar {
                width: 28px;
                height: 28px;
                font-size: 10px;
            }

            /* Better auth box */
            .auth-box {
                padding: 28px 20px;
            }

            .auth-box h1 {
                font-size: 24px;
            }

            .auth-box input {
                padding: 12px;
                font-size: 16px;
                /* prevent iOS zoom on focus */
            }

            .auth-box .btn {
                padding: 12px;
                font-size: 15px;
            }

            /* Bigger search input */
            .search-wrap input {
                padding: 10px 14px;
                font-size: 16px;
            }

            .search-results .item {
                padding: 12px 14px;
            }

            .input-bar textarea {
                font-size: 16px;
                padding: 10px 12px;
            }

            .input-bar .btn-send {
                padding: 10px 16px;
                font-size: 15px;
            }

            /* Empty state */
            .conv-list>div {
                padding: 40px 20px !important;
                font-size: 14px !important;
            }

            #noChat {
                font-size: 15px;
                padding: 40px 20px;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- ====== Auth Screen ====== -->
        <div id="authScreen">
            <div class="auth-box">
                <h1>myx-im</h1>
                <div class="sub">Instant Messaging</div>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌓</button>
                <label for="authUser">Username</label>
                <input id="authUser" placeholder="3-20 characters" maxlength="20" autocomplete="username">
                <label for="authPass">Password</label>
                <input id="authPass" type="password" placeholder="6-20 characters" maxlength="20"
                    autocomplete="current-password">
                <div class="err" id="authErr"></div>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="doRegister()">Register</button>
                    <button class="btn btn-outline" onclick="doLogin()">Login</button>
                </div>
            </div>
        </div>

        <!-- ====== Sidebar ====== -->
        <div id="sidebar" style="display:none">
            <div class="sidebar-header">
                <div class="avatar" id="myAvatar"></div>
                <div class="info">
                    <div class="name" id="myName"></div>
                    <div class="uid-text" id="myUid"></div>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌓</button>
                <button class="btn-logout" onclick="doLogout()">Logout</button>
            </div>
            <div class="search-wrap">
                <input id="searchInput" placeholder="Search users..." autocomplete="off" oninput="onSearchInput()"
                    onfocus="onSearchInput()">
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="tab-bar">
                <button id="tabChats" class="active" onclick="switchTab('chats')">💬 Chats</button>
                <button id="tabGroups" onclick="switchTab('groups')">👥 Groups</button>
            </div>
            <div class="conv-list" id="convList"></div>
        </div>

        <!-- ====== Main Chat ====== -->
        <div id="main" style="display:none">
            <div id="noChat">Select a conversation</div>
            <div id="chatArea" style="display:none">
                <div class="chat-header">
                    <button class="btn-back" onclick="closeChat()">←</button>
                    <div class="ch-avatar" id="chAvatar"></div>
                    <div>
                        <div class="ch-name" id="chName"></div>
                        <div class="ch-status" id="chStatus">offline</div>
                    </div>
                </div>
                <div class="msg-list" id="msgList">
                    <div class="msg-loading" id="loadMore" onclick="loadHistory()">Load earlier messages</div>
                </div>
                <div class="typing-indicator" id="typingHint" style="display:none"></div>
                <div class="input-bar">
                    <textarea id="msgInput" rows="1" placeholder="Type a message..."
                        onkeydown="onMsgKey(event)"></textarea>
                    <button class="btn-send" id="btnSend" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
        <div class="bottom-nav" id="bottomNav">
            <div class="nav-inner">
                <button id="navChats" class="active" onclick="switchTab('chats')"><span
                        class="icon">💬</span>Chats</button>
                <button id="navGroups" onclick="switchTab('groups')"><span class="icon">👥</span>Groups</button>
                <button onclick="doLogout()"><span class="icon">👤</span>Me</button>
            </div>
        </div>
    </div>

    <!-- ====== Modal ====== -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
        <div class="modal" id="modalCreateGroup">
            <h3>Create Group</h3>
            <label for="groupName">Group Name</label>
            <input id="groupName" placeholder="e.g. Dev Team" maxlength="50">
            <div class="err" id="groupErr"></div>
            <div class="btn-row">
                <button class="btn-outline" type="button" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="doCreateGroup()">Create</button>
            </div>
        </div>
        <div class="modal" id="modalJoinGroup" style="display:none">
            <h3>Join Group</h3>
            <label for="joinGroupId">Group ID</label>
            <input id="joinGroupId" placeholder="Paste group UUID">
            <div class="err" id="joinGroupErr"></div>
            <div class="btn-row">
                <button class="btn-outline" type="button" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="doJoinGroup()">Join</button>
            </div>
        </div>
    </div>

    <script>
        // ===== State =====
        let me = null;            // { uid, username, token }
        let ws = null;
        let peers = {};           // peer_uid → { username }
        let messages = [];        // current chat messages
        let activePeer = null;    // Uuid of active chat peer
        let convCache = [];       // cached conversation list
        let unreadCounts = {};    // peer_uid → number of unread messages
        let pendingMsgs = {};     // seq → { el, msg } for delivery status updates
        let msgById = {};         // msg_id → DOM element for late delivery updates
        let typingTimer = null;   // debounce for outgoing typing
        let typingTimeout = null; // timeout to hide incoming typing indicator
        let activeTab = 'chats';  // 'chats' | 'groups'
        let groupCache = [];      // cached group list
        let activeGroup = null;   // Uuid of active group (vs activePeer)

        const PAGE_SIZE = 40;

        // ===== DOM refs =====
        const $ = id => document.getElementById(id);
        const authScreen = $('authScreen');
        const sidebar = $('sidebar');
        const main = $('main');
        const chatArea = $('chatArea');
        const noChat = $('noChat');
        const msgList = $('msgList');
        const msgInput = $('msgInput');
        const convList = $('convList');
        const searchResults = $('searchResults');
        const loadMore = $('loadMore');

        // ===== Delivery status persistence =====
        function storageKey() { return me ? `mx_status_${me.uid}` : null; }

        function saveMsgStatus(msgId, status) {
            const key = storageKey();
            if (!key || !msgId) return;
            try {
                const data = JSON.parse(localStorage.getItem(key) || '{}');
                data[msgId] = status;
                // Keep last 500 entries to avoid unbounded growth
                const ids = Object.keys(data);
                if (ids.length > 500) {
                    ids.slice(0, ids.length - 500).forEach(k => delete data[k]);
                }
                localStorage.setItem(key, JSON.stringify(data));
            } catch (_) { }
        }

        function getMsgStatus(msgId) {
            const key = storageKey();
            if (!key || !msgId) return null;
            try {
                const data = JSON.parse(localStorage.getItem(key) || '{}');
                return data[msgId] || null;
            } catch (_) { return null; }
        }

        // ===== Auth =====
        function toggleTheme() {
            document.body.classList.toggle('light');
            localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
        }

        // Load saved theme
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

        async function api(path, opts = {}) {
            const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
            return res.json();
        }

        function setErr(msg) { $('authErr').textContent = msg || ''; }

        async function doRegister() {
            setErr();
            const u = $('authUser').value.trim(), p = $('authPass').value;
            if (u.length < 3 || p.length < 6) return setErr('Username ≥3, password ≥6 chars');
            const d = await api('/api/user/register', {
                method: 'POST', body: JSON.stringify({ username: u, password: p })
            });
            if (d.code === 200) { setErr('Registered! Now login.'); }
            else if (d.code === 409) { setErr('User exists, try login.'); }
            else { setErr(d.msg); }
        }

        async function doLogin() {
            setErr();
            const u = $('authUser').value.trim(), p = $('authPass').value;
            if (!u || !p) return setErr('Fill all fields');
            const d = await api('/api/user/login', {
                method: 'POST', body: JSON.stringify({ username: u, password: p })
            });
            if (d.code !== 200) return setErr(d.msg);
            const token = d.data;
            let uid;
            try { uid = JSON.parse(atob(token.split('.')[1])).user_id; } catch (_) { return setErr('Bad token'); }
            me = { uid, username: u, token };
            connectWS();
        }

        function doLogout() {
            if (ws) ws.close();
            me = null; ws = null; peers = {}; messages = []; activePeer = null; activeGroup = null; convCache = [];
            groupCache = []; unreadCounts = {}; pendingMsgs = {}; msgById = {};
            authScreen.style.display = 'flex';
            sidebar.style.display = 'none';
            main.style.display = 'none';
            chatArea.style.display = 'none';
            noChat.style.display = 'flex';
            document.body.classList.remove('chat-open');
        }

        // ===== WebSocket =====
        function connectWS() {
            if (ws) ws.close();
            ws = new WebSocket(`ws://${location.host}/im/ws?token=${encodeURIComponent(me.token)}`);
            ws.onopen = () => {
                authScreen.style.display = 'none';
                sidebar.style.display = 'flex';
                main.style.display = 'flex';
                $('myAvatar').textContent = me.username[0].toUpperCase();
                $('myName').textContent = me.username;
                $('myUid').textContent = me.uid;
                loadConversations();
            };
            ws.onclose = () => { ws = null; };
            ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg.cmd === 'private_push') {
                        handlePush(msg.data);
                    } else if (msg.cmd === 'group_push') {
                        handleGroupPush(msg.data);
                    } else if (msg.cmd === 'private_chat_ack') {
                        handleAck(msg);
                    } else if (msg.cmd === 'delivery_update') {
                        handleDeliveryUpdate(msg);
                    } else if (msg.cmd === 'typing') {
                        handleTyping(msg);
                    } else if (msg.cmd === 'read_receipt') {
                        handleReadReceipt(msg);
                    } else if (msg.cmd === 'kicked') {
                        $('authErr').textContent = 'Logged in from another device';
                        doLogout();
                    }
                } catch (_) { }
            };
        }

        function handlePush(msg) {
            const peerUid = msg.from_uid === me.uid ? msg.to_uid : msg.from_uid;
            if (!peers[peerUid]) {
                peers[peerUid] = { username: msg.from_uid === me.uid ? 'You' : peerUid.substring(0, 8) };
            }
            if (activePeer === peerUid) {
                appendMsg({ msg_id: Date.now(), from_uid: msg.from_uid, to_uid: msg.to_uid, content: msg.content, msg_type: msg.msg_type, send_time: msg.send_time });
            } else {
                // Not the active conversation — count as unread
                unreadCounts[peerUid] = (unreadCounts[peerUid] || 0) + 1;
                renderConvList();
            }
            // Refresh conversations to update last message
            loadConversations();
        }

        function handleGroupPush(msg) {
            if (activeGroup === msg.group_id && msg.from_uid !== me.uid) {
                appendGroupMsg({
                    msg_id: Date.now(), group_id: msg.group_id, from_uid: msg.from_uid,
                    from_name: msg.from_name, content: msg.content, msg_type: msg.msg_type,
                    send_time: msg.send_time
                });
            }
        }

        function handleAck(msg) {
            let entry = pendingMsgs[msg.seq];
            // Fallback: try to find by walking pendingMsgs if seq doesn't match directly
            if (!entry) {
                for (const key of Object.keys(pendingMsgs)) {
                    if (Number(key) === Number(msg.seq)) {
                        entry = pendingMsgs[key];
                        break;
                    }
                }
            }
            if (!entry) return;
            const status = entry.el.querySelector('.msg-status');
            if (!status) return;
            const delivered = !!(msg.data && msg.data.delivered);
            if (delivered) {
                status.innerHTML = '<span class="delivered">✓ Delivered</span>';
            } else {
                status.innerHTML = '<span class="undelivered">◷ Sent (offline)</span>';
            }
            if (msg.data && msg.data.msg_id) {
                entry.msg.msg_id = msg.data.msg_id;
                msgById[msg.data.msg_id] = entry.el;
                saveMsgStatus(msg.data.msg_id, delivered ? 'delivered' : 'undelivered');
            }
            delete pendingMsgs[msg.seq];
        }

        function handleDeliveryUpdate(msg) {
            const ids = msg.data && msg.data.msg_ids;
            if (!ids) return;
            for (const mid of ids) {
                const el = msgById[mid];
                if (!el) continue;
                const status = el.querySelector('.msg-status');
                if (status) {
                    status.innerHTML = '<span class="delivered">✓ Delivered</span>';
                    saveMsgStatus(mid, 'delivered');
                }
            }
        }

        function handleTyping(msg) {
            const fromUid = msg.data && msg.data.from_uid;
            if (!fromUid || activePeer !== fromUid) return;
            const hint = $('typingHint');
            const name = (peers[fromUid] && peers[fromUid].username) || fromUid.substring(0, 8);
            hint.textContent = `${name} is typing...`;
            hint.style.display = 'block';
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { hint.style.display = 'none'; }, 3000);
        }

        function sendTyping() {
            if (!activePeer || !ws || ws.readyState !== 1) return;
            ws.send(JSON.stringify({ cmd: 'typing', seq: 0, data: { to_uid: activePeer } }));
        }

        function handleReadReceipt(msg) {
            const peerUid = msg.data && msg.data.peer_uid;
            const lastReadId = msg.data && msg.data.last_read_msg_id;
            if (!peerUid || !lastReadId) return;
            // Update all my delivered messages in this conversation to "Read"
            const items = msgList.querySelectorAll('.msg-row.mine');
            for (const el of items) {
                // Find this message in messages array by DOM position
                const status = el.querySelector('.msg-status');
                if (!status || !status.textContent.includes('Delivered')) continue;
                // Update all delivered to Read (simplified: we don't have msg_id on DOM)
                status.innerHTML = '<span class="delivered">✓ Read</span>';
                // Persist read status (find msg_id from msgById reverse lookup)
                for (const [mid, el] of Object.entries(msgById)) {
                    if (el === el.parentElement) saveMsgStatus(Number(mid), 'read');
                }
            }
        }

        // ===== Tab switching =====

        function switchTab(tab) {
            activeTab = tab;
            $('tabChats').classList.toggle('active', tab === 'chats');
            $('tabGroups').classList.toggle('active', tab === 'groups');
            if ($('navChats')) $('navChats').classList.toggle('active', tab === 'chats');
            if ($('navGroups')) $('navGroups').classList.toggle('active', tab === 'groups');
            if (tab === 'groups') {
                loadGroupList();
            } else {
                renderConvList();
            }
        }

        async function loadGroupList() {
            if (!me) return;
            const d = await api(`/api/group/list?token=${encodeURIComponent(me.token)}`);
            if (d.code !== 200) return;
            groupCache = d.data || [];
            renderGroupList();
        }

        function renderGroupList() {
            convList.innerHTML = `<div style="padding:10px 14px;display:flex;gap:6px"><button style="flex:1;padding:6px;border-radius:4px;font-size:12px;background:var(--primary);color:#fff;border:none;cursor:pointer" onclick="openModal('create')">+ Create Group</button><button style="flex:1;padding:6px;border-radius:4px;font-size:12px;border:1px solid var(--border);color:var(--text);background:transparent;cursor:pointer" onclick="openModal('join')">Join Group</button></div>`
                + (groupCache.length === 0
                    ? `<div style="padding:30px;text-align:center;color:var(--text2);font-size:13px">No groups yet.</div>`
                    : groupCache.map(g => `
                    <div class="conv-item${activeGroup === g.group_id ? ' active' : ''}" onclick="openGroupChat('${g.group_id}','${escHtml(g.name)}')">
                        <div class="c-avatar">👥</div>
                        <div class="c-info"><div class="c-name">${escHtml(g.name)}</div><div class="c-last">${g.member_count} members</div></div>
                    </div>`).join(''));
        }

        function openGroupChat(groupId, groupName) {
            activeGroup = groupId;
            activePeer = null;
            if (!peers[groupId]) peers[groupId] = { username: groupName };
            document.body.classList.add('chat-open');
            main.classList.add('chat-open');
            noChat.style.display = 'none';
            chatArea.style.display = 'flex';
            $('chAvatar').textContent = '👥';
            $('chName').textContent = groupName;
            $('chStatus').textContent = 'group';
            messages = [];
            msgList.innerHTML = '';
            msgList.appendChild(loadMore);
            loadMore.style.display = 'block';
            loadMore.onclick = () => loadGroupHistory();
            loadGroupHistory();
            renderGroupList();
            msgInput.focus();
        }

        async function loadGroupHistory() {
            if (!activeGroup || !me) return;
            const before = messages.length > 0 ? messages[0].msg_id : null;
            let url = `/api/group/history?token=${encodeURIComponent(me.token)}&group_id=${activeGroup}&limit=${PAGE_SIZE}`;
            if (before) url += `&before=${before}`;
            const d = await api(url);
            if (d.code !== 200 || !d.data) { loadMore.textContent = 'No messages'; return; }
            const items = d.data;
            if (items.length === 0) { loadMore.textContent = 'No messages'; loadMore.style.cursor = 'default'; return; }
            if (items.length < PAGE_SIZE) { loadMore.textContent = 'All loaded'; loadMore.style.cursor = 'default'; }
            else { loadMore.textContent = 'Load earlier'; loadMore.style.cursor = 'pointer'; }
            for (let i = items.length - 1; i >= 0; i--) messages.unshift(items[i]);
            renderGroupMessages();
        }

        function renderGroupMessages() {
            msgList.innerHTML = '';
            msgList.appendChild(loadMore);
            for (const m of messages) appendGroupMsg(m);
            msgList.scrollTop = msgList.scrollHeight;
        }

        function appendGroupMsg(m) {
            const isMine = m.from_uid === me.uid;
            const name = m.from_name || m.from_uid.substring(0, 8);
            const time = new Date(Number(m.send_time)).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = 'msg-row' + (isMine ? ' mine' : '');
            div.innerHTML = `<div class="m-avatar">${name[0].toUpperCase()}</div>
        <div><div class="msg-bubble">${isMine ? '' : '<b>' + escHtml(name) + '</b><br>'}${escHtml(m.content)}</div><div class="msg-time">${time}</div></div>`;
            msgList.appendChild(div);
            msgList.scrollTop = msgList.scrollHeight;
        }

        // ===== Modal =====

        function openModal(type) {
            $('modalOverlay').classList.add('show');
            $('groupErr').textContent = '';
            $('joinGroupErr').textContent = '';
            if (type === 'create') {
                $('modalCreateGroup').style.display = 'block';
                $('modalJoinGroup').style.display = 'none';
                $('groupName').focus();
            } else {
                $('modalCreateGroup').style.display = 'none';
                $('modalJoinGroup').style.display = 'block';
                $('joinGroupId').focus();
            }
        }

        function closeModal() {
            $('modalOverlay').classList.remove('show');
        }

        async function doCreateGroup() {
            const name = $('groupName').value.trim();
            if (!name) { $('groupErr').textContent = 'Enter a group name'; return; }
            const d = await api('/api/group/create', {
                method: 'POST',
                body: JSON.stringify({ token: me.token, name })
            });
            if (d.code !== 200) { $('groupErr').textContent = d.msg; return; }
            closeModal();
            $('groupName').value = '';
            loadGroupList();
        }

        async function doJoinGroup() {
            const groupId = $('joinGroupId').value.trim();
            if (!groupId) { $('joinGroupErr').textContent = 'Enter a group ID'; return; }
            const d = await api('/api/group/join', {
                method: 'POST',
                body: JSON.stringify({ token: me.token, group_id: groupId })
            });
            if (d.code !== 200) { $('joinGroupErr').textContent = d.msg; return; }
            closeModal();
            $('joinGroupId').value = '';
            loadGroupList();
        }

        // ===== Modal =====

        function openModal(type) {
            $('modalOverlay').classList.add('show');
            $('groupErr').textContent = '';
            $('joinGroupErr').textContent = '';
            if (type === 'create') {
                $('modalCreateGroup').style.display = 'block';
                $('modalJoinGroup').style.display = 'none';
                $('groupName').focus();
            } else {
                $('modalCreateGroup').style.display = 'none';
                $('modalJoinGroup').style.display = 'block';
                $('joinGroupId').focus();
            }
        }

        function closeModal() {
            $('modalOverlay').classList.remove('show');
        }

        async function doCreateGroup() {
            const name = $('groupName').value.trim();
            if (!name) { $('groupErr').textContent = 'Enter a group name'; return; }
            const d = await api('/api/group/create', {
                method: 'POST',
                body: JSON.stringify({ token: me.token, name })
            });
            if (d.code !== 200) { $('groupErr').textContent = d.msg; return; }
            closeModal();
            $('groupName').value = '';
            loadGroupList();
        }

        async function doJoinGroup() {
            const groupId = $('joinGroupId').value.trim();
            if (!groupId) { $('joinGroupErr').textContent = 'Enter a group ID'; return; }
            const d = await api('/api/group/join', {
                method: 'POST',
                body: JSON.stringify({ token: me.token, group_id: groupId })
            });
            if (d.code !== 200) { $('joinGroupErr').textContent = d.msg; return; }
            closeModal();
            $('joinGroupId').value = '';
            loadGroupList();
        }

        // ===== Conversations =====
        async function loadConversations() {
            const d = await api(`/api/conversations?token=${encodeURIComponent(me.token)}`);
            if (d.code !== 200) return;
            convCache = d.data || [];
            for (const c of convCache) {
                if (!peers[c.peer_uid]) peers[c.peer_uid] = { username: c.peer_name };
            }
            renderConvList();
        }

        function renderConvList() {
            convList.innerHTML = convCache.length === 0
                ? '<div style="padding:30px;text-align:center;color:var(--text2);font-size:13px">No conversations yet.<br>Search for users to start chatting.</div>'
                : convCache.map(c => {
                    const time = new Date(c.last_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    return `<div class="conv-item${activePeer === c.peer_uid ? ' active' : ''}" onclick="openChat('${c.peer_uid}','${c.peer_name}')">
                <div class="c-avatar">${(c.peer_name || '?')[0].toUpperCase()}</div>
                <div class="c-info"><div class="c-name">${c.peer_name}${unreadCounts[c.peer_uid] ? ` <span class="badge">${unreadCounts[c.peer_uid]}</span>` : ''}</div><div class="c-last">${escHtml(c.last_msg)}</div></div>
                <div class="c-meta"><div class="c-time">${time}</div></div>
            </div>`;
                }).join('');
        }

        function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        // ===== Chat =====
        function openChat(peerUid, peerName) {
            activePeer = peerUid;
            activeGroup = null;
            loadMore.onclick = () => loadHistory();
            // Clear unread and notify server
            if (unreadCounts[peerUid]) {
                delete unreadCounts[peerUid];
                if (ws && ws.readyState === 1) {
                    ws.send(JSON.stringify({ cmd: 'mark_delivered', seq: 0, data: { peer_uid: peerUid } }));
                }
            }
            document.body.classList.add('chat-open');
            main.classList.add('chat-open');
            noChat.style.display = 'none';
            chatArea.style.display = 'flex';
            $('chAvatar').textContent = (peers[peerUid].username || '?')[0].toUpperCase();
            $('chName').textContent = peers[peerUid].username;
            messages = [];
            msgList.innerHTML = '';
            msgList.appendChild(loadMore);
            loadMore.style.display = 'block';
            renderConvList();
            loadHistory();
            msgInput.focus();
        }

        function closeChat() {
            activePeer = null;
            activeGroup = null;
            clearTimeout(typingTimeout);
            $('typingHint').style.display = 'none';
            document.body.classList.remove('chat-open');
            main.classList.remove('chat-open');
            noChat.style.display = 'flex';
            chatArea.style.display = 'none';
            messages = [];
            loadMore.onclick = () => loadHistory();
            if (activeTab === 'groups') renderGroupList(); else renderConvList();
        }

        async function loadHistory() {
            if (!activePeer || !me) return;
            const before = messages.length > 0 ? messages[0].msg_id : null;
            let url = `/api/message/history?token=${encodeURIComponent(me.token)}&peer_uid=${activePeer}&limit=${PAGE_SIZE}`;
            if (before) url += `&before=${before}`;
            const d = await api(url);
            if (d.code !== 200 || !d.data) { loadMore.textContent = 'No messages yet'; return; }
            const items = d.data;
            if (items.length === 0) { loadMore.textContent = 'No earlier messages'; loadMore.style.cursor = 'default'; return; }
            if (items.length < PAGE_SIZE) { loadMore.textContent = 'All messages loaded'; loadMore.style.cursor = 'default'; }
            else { loadMore.textContent = 'Load earlier messages'; loadMore.style.cursor = 'pointer'; }
            // Prepend in reverse (API returns DESC, we want chronological)
            for (let i = 0; i < items.length; i++) {
                messages.unshift(items[i]);
            }
            renderMessages();
        }

        function renderMessages() {
            // Preserve loadMore element
            msgList.innerHTML = '';
            msgList.appendChild(loadMore);
            for (const m of messages) {
                appendMsg(m);
            }
            msgList.scrollTop = msgList.scrollHeight;
        }

        function appendMsg(m, status) {
            const isMine = m.from_uid === me.uid;
            const name = isMine ? me.username : (peers[m.from_uid]?.username || m.from_uid.substring(0, 8));
            const time = new Date(Number(m.send_time)).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            // Restore persisted delivery status for history messages
            if (!status && isMine && m.msg_id) {
                const saved = getMsgStatus(m.msg_id);
                if (saved === 'delivered') status = '<span class="delivered">✓ Delivered</span>';
                else if (saved === 'read') status = '<span class="delivered">✓ Read</span>';
                else if (saved === 'undelivered') status = '<span class="undelivered">◷ Sent (offline)</span>';
            }
            const div = document.createElement('div');
            div.className = 'msg-row' + (isMine ? ' mine' : '');
            div.innerHTML = `<div class="m-avatar">${name[0].toUpperCase()}</div>
        <div><div class="msg-bubble">${escHtml(m.content)}</div><div class="msg-time">${time}</div><div class="msg-status">${status || ''}</div></div>`;
            msgList.appendChild(div);
            msgList.scrollTop = msgList.scrollHeight;
            // Register msg_id for late delivery updates
            if (m.msg_id && isMine) msgById[m.msg_id] = div;
            return div;
        }

        function sendMessage() {
            if (!ws || ws.readyState !== 1) return;
            const content = msgInput.value.trim();
            if (!content) return;

            if (activeGroup) {
                // Group chat
                const cid = crypto.randomUUID();
                ws.send(JSON.stringify({ cmd: 'group_chat', seq: Date.now(), data: { group_id: activeGroup, content, msg_type: 1, client_msg_id: cid } }));
                appendGroupMsg({ msg_id: Date.now(), group_id: activeGroup, from_uid: me.uid, from_name: me.username, content, msg_type: 1, send_time: Date.now() });
            } else if (activePeer) {
                // Private chat
                const seq = Date.now();
                const cid = crypto.randomUUID();
                const msg = { msg_id: seq, from_uid: me.uid, to_uid: activePeer, content, msg_type: 1, send_time: Date.now() };
                const el = appendMsg(msg, '<span class="pending">◷ Sending...</span>');
                pendingMsgs[seq] = { el, msg };
                ws.send(JSON.stringify({ cmd: 'private_chat', seq, data: { to_uid: activePeer, content, msg_type: 1, client_msg_id: cid } }));
            }
            msgInput.value = '';
            msgInput.style.height = 'auto';
            msgInput.focus();
        }

        function onMsgKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); return; }
            // Debounced typing indicator
            clearTimeout(typingTimer);
            typingTimer = setTimeout(sendTyping, 500);
            // Auto-resize
            setTimeout(() => {
                msgInput.style.height = 'auto';
                msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
            }, 0);
        }

        // ===== User Search =====
        let searchTimer;
        async function onSearchInput() {
            clearTimeout(searchTimer);
            const q = $('searchInput').value.trim();
            if (!q) { searchResults.classList.remove('show'); return; }
            searchTimer = setTimeout(async () => {
                const d = await api(`/api/user/search?token=${encodeURIComponent(me.token)}&q=${encodeURIComponent(q)}&limit=8`);
                if (d.code !== 200 || !d.data) return;
                searchResults.innerHTML = d.data.map(u => `
            <div class="item" onclick="startChat('${u.id}','${u.username}')">
                <div class="sr-avatar">${u.username[0].toUpperCase()}</div>
                <div>${u.username}</div>
            </div>`).join('');
                searchResults.classList.add('show');
            }, 300);
        }

        function startChat(peerUid, peerName) {
            $('searchInput').value = '';
            searchResults.classList.remove('show');
            peers[peerUid] = { username: peerName };
            openChat(peerUid, peerName);
            // Refresh conv list after a short delay to pick up new conversation
            setTimeout(loadConversations, 500);
        }

        // ===== Global click to close search =====
        document.addEventListener('click', e => {
            if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
        });

        // ===== Mobile keyboard handling (iOS) =====
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                const keyboardHeight = window.innerHeight - window.visualViewport.height;
                if (keyboardHeight > 100) {
                    // Keyboard is open — scroll to bottom
                    msgList.scrollTop = msgList.scrollHeight;
                }
            });
        }
    </script>
</body>

</html>
