<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>myx-im</title>
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text2: #888;
            --primary: #4a9eff;
            --primary-dim: #3a7ecc;
            --accent: #6eca6e;
            --danger: #e05555;
            --radius: 10px;
            --radius-sm: 6px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --sidebar-w: 320px;
        }

        /* ===== Reset ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100dvh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font: 14px/1.5 var(--font);
            background: var(--bg);
            color: var(--text);
        }

        input,
        button {
            font: inherit;
            color: inherit;
            border: none;
            outline: none;
            background: none;
        }

        button {
            cursor: pointer;
        }

        input {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* ===== Layout ===== */
        #app {
            display: flex;
            height: 100%;
        }

        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #chatArea {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #noChat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            font-size: 14px;
        }

        /* ===== Auth Screen ===== */
        #authScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        .auth-box {
            width: 100%;
            max-width: 340px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 24px;
        }

        .auth-box h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 6px;
        }

        .auth-box .sub {
            text-align: center;
            color: var(--text2);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .auth-box label {
            display: block;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 4px;
            margin-top: 12px;
        }

        .auth-box input {
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
        }

        .auth-box input:focus {
            border-color: var(--primary);
        }

        .auth-box .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .auth-box .btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dim);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--surface2);
        }

        .auth-box .err {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            min-height: 18px;
        }

        /* ===== Sidebar ===== */
        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .sidebar-header .info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-header .name {
            font-weight: 600;
            font-size: 15px;
        }

        .sidebar-header .uid-text {
            font-size: 11px;
            color: var(--text2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-header .btn-logout {
            padding: 6px 10px;
            font-size: 12px;
            color: var(--text2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .sidebar-header .btn-logout:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        .search-wrap {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .search-wrap input {
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
        }

        .search-wrap input:focus {
            border-color: var(--primary);
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 14px;
            right: 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
        }

        .search-results.show {
            display: block;
        }

        .search-results .item {
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-results .item:hover {
            background: var(--surface);
        }

        .search-results .item .sr-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
        }

        .conv-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background .15s;
        }

        .conv-item:hover {
            background: var(--surface2);
        }

        .conv-item.active {
            background: var(--surface2);
            border-left: 3px solid var(--primary);
        }

        .conv-item .c-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .conv-item .c-info {
            flex: 1;
            min-width: 0;
        }

        .conv-item .c-name {
            font-weight: 600;
            font-size: 14px;
        }

        .conv-item .c-last {
            font-size: 12px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-item .c-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .conv-item .c-time {
            font-size: 11px;
            color: var(--text2);
        }

        /* ===== Chat Header ===== */
        .chat-header {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
        }

        .chat-header .btn-back {
            display: none;
            padding: 4px 8px;
            font-size: 18px;
            color: var(--text2);
        }

        .chat-header .ch-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .chat-header .ch-name {
            font-weight: 600;
            font-size: 15px;
        }

        .chat-header .ch-status {
            font-size: 11px;
            color: var(--text2);
        }

        /* ===== Messages ===== */
        .msg-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg-loading {
            text-align: center;
            padding: 20px;
            color: var(--text2);
            font-size: 12px;
            cursor: pointer;
        }

        .msg-loading:hover {
            color: var(--primary);
        }

        .msg-row {
            display: flex;
            gap: 8px;
            max-width: 75%;
        }

        .msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row .m-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            flex-shrink: 0;
        }

        .msg-row.mine .m-avatar {
            background: var(--primary);
            color: #fff;
        }

        .msg-bubble {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: var(--surface2);
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-row.mine .msg-bubble {
            background: var(--primary);
            color: #fff;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text2);
            margin-top: 2px;
        }

        /* ===== Input Bar ===== */
        .input-bar {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: var(--surface);
        }

        .input-bar textarea {
            flex: 1;
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            resize: none;
            min-height: 38px;
            max-height: 120px;
            line-height: 1.4;
            color: var(--text);
        }

        .input-bar textarea:focus {
            border-color: var(--primary);
        }

        .input-bar .btn-send {
            padding: 8px 16px;
            background: var(--primary);
            color: #fff;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
        }

        .input-bar .btn-send:hover {
            background: var(--primary-dim);
        }

        .input-bar .btn-send:disabled {
            opacity: .4;
            cursor: default;
        }

        /* ===== Responsive ===== */
        @media (max-width: 700px) {
            #sidebar {
                width: 100%;
                min-width: 100%;
            }

            #main {
                display: none;
            }

            .chat-open #sidebar {
                display: none;
            }

            .chat-open #main {
                display: flex;
            }

            .chat-header .btn-back {
                display: block;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- ====== Auth Screen ====== -->
        <div id="authScreen">
            <div class="auth-box">
                <h1>myx-im</h1>
                <div class="sub">Instant Messaging</div>
                <label for="authUser">Username</label>
                <input id="authUser" placeholder="3-20 characters" maxlength="20" autocomplete="username">
                <label for="authPass">Password</label>
                <input id="authPass" type="password" placeholder="6-20 characters" maxlength="20"
                    autocomplete="current-password">
                <div class="err" id="authErr"></div>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="doRegister()">Register</button>
                    <button class="btn btn-outline" onclick="doLogin()">Login</button>
                </div>
            </div>
        </div>

        <!-- ====== Sidebar ====== -->
        <div id="sidebar" style="display:none">
            <div class="sidebar-header">
                <div class="avatar" id="myAvatar"></div>
                <div class="info">
                    <div class="name" id="myName"></div>
                    <div class="uid-text" id="myUid"></div>
                </div>
                <button class="btn-logout" onclick="doLogout()">Logout</button>
            </div>
            <div class="search-wrap">
                <input id="searchInput" placeholder="Search users..." autocomplete="off" oninput="onSearchInput()"
                    onfocus="onSearchInput()">
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="conv-list" id="convList"></div>
        </div>

        <!-- ====== Main Chat ====== -->
        <div id="main" style="display:none">
            <div id="noChat">Select a conversation</div>
            <div id="chatArea" style="display:none">
                <div class="chat-header">
                    <button class="btn-back" onclick="closeChat()">←</button>
                    <div class="ch-avatar" id="chAvatar"></div>
                    <div>
                        <div class="ch-name" id="chName"></div>
                        <div class="ch-status" id="chStatus">offline</div>
                    </div>
                </div>
                <div class="msg-list" id="msgList">
                    <div class="msg-loading" id="loadMore" onclick="loadHistory()">Load earlier messages</div>
                </div>
                <div class="input-bar">
                    <textarea id="msgInput" rows="1" placeholder="Type a message..."
                        onkeydown="onMsgKey(event)"></textarea>
                    <button class="btn-send" id="btnSend" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== State =====
        let me = null;            // { uid, username, token }
        let ws = null;
        let peers = {};           // peer_uid → { username }
        let messages = [];        // current chat messages
        let activePeer = null;    // Uuid of active chat peer
        let convCache = [];       // cached conversation list

        const PAGE_SIZE = 40;

        // ===== DOM refs =====
        const $ = id => document.getElementById(id);
        const authScreen = $('authScreen');
        const sidebar = $('sidebar');
        const main = $('main');
        const chatArea = $('chatArea');
        const noChat = $('noChat');
        const msgList = $('msgList');
        const msgInput = $('msgInput');
        const convList = $('convList');
        const searchResults = $('searchResults');
        const loadMore = $('loadMore');

        // ===== Auth =====
        async function api(path, opts = {}) {
            const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
            return res.json();
        }

        function setErr(msg) { $('authErr').textContent = msg || ''; }

        async function doRegister() {
            setErr();
            const u = $('authUser').value.trim(), p = $('authPass').value;
            if (u.length < 3 || p.length < 6) return setErr('Username ≥3, password ≥6 chars');
            const d = await api('/api/user/register', {
                method: 'POST', body: JSON.stringify({ username: u, password: p })
            });
            if (d.code === 200) { setErr('Registered! Now login.'); }
            else if (d.code === 409) { setErr('User exists, try login.'); }
            else { setErr(d.msg); }
        }

        async function doLogin() {
            setErr();
            const u = $('authUser').value.trim(), p = $('authPass').value;
            if (!u || !p) return setErr('Fill all fields');
            const d = await api('/api/user/login', {
                method: 'POST', body: JSON.stringify({ username: u, password: p })
            });
            if (d.code !== 200) return setErr(d.msg);
            const token = d.data;
            let uid;
            try { uid = JSON.parse(atob(token.split('.')[1])).user_id; } catch (_) { return setErr('Bad token'); }
            me = { uid, username: u, token };
            connectWS();
        }

        function doLogout() {
            if (ws) ws.close();
            me = null; ws = null; peers = {}; messages = []; activePeer = null; convCache = [];
            authScreen.style.display = 'flex';
            sidebar.style.display = 'none';
            main.style.display = 'none';
            chatArea.style.display = 'none';
            noChat.style.display = 'flex';
            document.body.classList.remove('chat-open');
        }

        // ===== WebSocket =====
        function connectWS() {
            if (ws) ws.close();
            ws = new WebSocket(`ws://${location.host}/im/ws?token=${encodeURIComponent(me.token)}`);
            ws.onopen = () => {
                authScreen.style.display = 'none';
                sidebar.style.display = 'flex';
                main.style.display = 'flex';
                $('myAvatar').textContent = me.username[0].toUpperCase();
                $('myName').textContent = me.username;
                $('myUid').textContent = me.uid;
                loadConversations();
            };
            ws.onclose = () => { ws = null; };
            ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg.from_uid && msg.to_uid && msg.content !== undefined && !msg.cmd) {
                        handlePush(msg);
                    } else if (msg.cmd === 'private_chat_ack') {
                        handleAck(msg);
                    }
                } catch (_) { }
            };
        }

        function handlePush(msg) {
            const peerUid = msg.from_uid === me.uid ? msg.to_uid : msg.from_uid;
            if (!peers[peerUid]) {
                peers[peerUid] = { username: msg.from_uid === me.uid ? 'You' : peerUid.substring(0, 8) };
                // Refresh conv list later
            }
            if (activePeer === peerUid) {
                appendMsg({ msg_id: Date.now(), from_uid: msg.from_uid, to_uid: msg.to_uid, content: msg.content, msg_type: msg.msg_type, send_time: msg.send_time });
            }
            // Refresh conversations to update last message
            loadConversations();
        }

        function handleAck(msg) {
            // Update the pending message if we track it
        }

        // ===== Conversations =====
        async function loadConversations() {
            const d = await api(`/api/conversations?token=${encodeURIComponent(me.token)}`);
            if (d.code !== 200) return;
            convCache = d.data || [];
            for (const c of convCache) {
                if (!peers[c.peer_uid]) peers[c.peer_uid] = { username: c.peer_name };
            }
            renderConvList();
        }

        function renderConvList() {
            convList.innerHTML = convCache.length === 0
                ? '<div style="padding:30px;text-align:center;color:var(--text2);font-size:13px">No conversations yet.<br>Search for users to start chatting.</div>'
                : convCache.map(c => {
                    const time = new Date(c.last_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    return `<div class="conv-item${activePeer === c.peer_uid ? ' active' : ''}" onclick="openChat('${c.peer_uid}','${c.peer_name}')">
                <div class="c-avatar">${(c.peer_name || '?')[0].toUpperCase()}</div>
                <div class="c-info"><div class="c-name">${c.peer_name}</div><div class="c-last">${escHtml(c.last_msg)}</div></div>
                <div class="c-meta"><div class="c-time">${time}</div></div>
            </div>`;
                }).join('');
        }

        function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        // ===== Chat =====
        function openChat(peerUid, peerName) {
            activePeer = peerUid;
            if (!peers[peerUid]) peers[peerUid] = { username: peerName || peerUid.substring(0, 8) };
            document.body.classList.add('chat-open');
            noChat.style.display = 'none';
            chatArea.style.display = 'flex';
            $('chAvatar').textContent = (peers[peerUid].username || '?')[0].toUpperCase();
            $('chName').textContent = peers[peerUid].username;
            messages = [];
            msgList.innerHTML = '';
            msgList.appendChild(loadMore);
            loadMore.style.display = 'block';
            renderConvList();
            loadHistory();
            msgInput.focus();
        }

        function closeChat() {
            activePeer = null;
            document.body.classList.remove('chat-open');
            noChat.style.display = 'flex';
            chatArea.style.display = 'none';
            messages = [];
            renderConvList();
        }

        async function loadHistory() {
            if (!activePeer || !me) return;
            const before = messages.length > 0 ? messages[0].msg_id : null;
            let url = `/api/message/history?token=${encodeURIComponent(me.token)}&peer_uid=${activePeer}&limit=${PAGE_SIZE}`;
            if (before) url += `&before=${before}`;
            const d = await api(url);
            if (d.code !== 200 || !d.data) { loadMore.textContent = 'No messages yet'; return; }
            const items = d.data;
            if (items.length === 0) { loadMore.textContent = 'No earlier messages'; loadMore.style.cursor = 'default'; return; }
            if (items.length < PAGE_SIZE) { loadMore.textContent = 'All messages loaded'; loadMore.style.cursor = 'default'; }
            else { loadMore.textContent = 'Load earlier messages'; loadMore.style.cursor = 'pointer'; }
            // Prepend in reverse (API returns DESC, we want chronological)
            for (let i = items.length - 1; i >= 0; i--) {
                messages.unshift(items[i]);
            }
            renderMessages();
        }

        function renderMessages() {
            // Preserve loadMore element
            msgList.innerHTML = '';
            msgList.appendChild(loadMore);
            for (const m of messages) {
                appendMsg(m);
            }
            msgList.scrollTop = msgList.scrollHeight;
        }

        function appendMsg(m) {
            const isMine = m.from_uid === me.uid;
            const name = isMine ? me.username : (peers[m.from_uid]?.username || m.from_uid.substring(0, 8));
            const time = new Date(Number(m.send_time)).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = 'msg-row' + (isMine ? ' mine' : '');
            div.innerHTML = `<div class="m-avatar">${name[0].toUpperCase()}</div>
        <div><div class="msg-bubble">${escHtml(m.content)}</div><div class="msg-time">${time}</div></div>`;
            msgList.appendChild(div);
            msgList.scrollTop = msgList.scrollHeight;
        }

        function sendMessage() {
            if (!ws || ws.readyState !== 1 || !activePeer) return;
            const content = msgInput.value.trim();
            if (!content) return;
            ws.send(JSON.stringify({ cmd: 'private_chat', seq: Date.now(), data: { to_uid: activePeer, content, msg_type: 1 } }));
            appendMsg({ msg_id: Date.now(), from_uid: me.uid, to_uid: activePeer, content, msg_type: 1, send_time: Date.now() });
            msgInput.value = '';
            msgInput.style.height = 'auto';
            msgInput.focus();
        }

        function onMsgKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            // Auto-resize
            setTimeout(() => {
                msgInput.style.height = 'auto';
                msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
            }, 0);
        }

        // ===== User Search =====
        let searchTimer;
        async function onSearchInput() {
            clearTimeout(searchTimer);
            const q = $('searchInput').value.trim();
            if (!q) { searchResults.classList.remove('show'); return; }
            searchTimer = setTimeout(async () => {
                const d = await api(`/api/user/search?token=${encodeURIComponent(me.token)}&q=${encodeURIComponent(q)}&limit=8`);
                if (d.code !== 200 || !d.data) return;
                searchResults.innerHTML = d.data.map(u => `
            <div class="item" onclick="startChat('${u.id}','${u.username}')">
                <div class="sr-avatar">${u.username[0].toUpperCase()}</div>
                <div>${u.username}</div>
            </div>`).join('');
                searchResults.classList.add('show');
            }, 300);
        }

        function startChat(peerUid, peerName) {
            $('searchInput').value = '';
            searchResults.classList.remove('show');
            peers[peerUid] = { username: peerName };
            openChat(peerUid, peerName);
            // Refresh conv list after a short delay to pick up new conversation
            setTimeout(loadConversations, 500);
        }

        // ===== Global click to close search =====
        document.addEventListener('click', e => {
            if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
        });
    </script>
</body>

</html>
